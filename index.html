<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰릭스 모빌리티 — 신차 장기렌터카 견적</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ================================================================
   * Welrix Design Tokens — 견적서 official 양식 기준
   * 모든 화면(영업 ERP / 견적서 / 손님 / 관리자 / 모달) 공통
   * brand 색은 회사 config 의 brand_color 로 동적 override 가능
   * ================================================================ */
  :root {
    /* Brand (회사별 override 가능 — setCompanyConfig 에서 setProperty) */
    --brand: #e1141e;
    --brand-700: #b81018;
    --brand-100: #fcd5d8;
    --brand-50:  #fff1f2;

    /* Ink scale (텍스트 위계) */
    --ink-1: #0a0a0a;   /* primary 텍스트 */
    --ink-2: #404040;   /* secondary 텍스트 */
    --ink-3: #737373;   /* 보조 텍스트 / 라벨 */
    --ink-4: #a3a3a3;   /* placeholder / hint */
    --ink-5: #d4d4d4;   /* disabled */

    /* Line (구분선 / 보더) */
    --line:   #f0f0f0;  /* 가장 옅은 — 섹션 내 미세 구분 */
    --line-2: #e5e5e5;  /* 일반 보더 — 카드/표 */
    --line-3: #d8d8d8;  /* 진한 보더 — 격자 표 */

    /* Background */
    --bg:        #ffffff;
    --bg-soft:   #fafafa;   /* 카드 보조 / hover */
    --bg-muted:  #f5f5f5;   /* 모달 배경 / disabled */
    --bg-grey:   #f4f5f7;   /* 데스크탑 캔버스 */

    /* Accent (legacy) */
    --accent: #0a0a0a;
    --accent-soft: #f5f5f5;

    /* Radius */
    --radius-sm: 4px;
    --radius:    6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-pill: 999px;

    /* Spacing scale (4 단계) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;

    /* Typography */
    --font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    --font-size-xs:   10px;   /* meta / hint */
    --font-size-sm:   11.5px; /* 보조 텍스트 */
    --font-size-base: 12.5px; /* 기본 입력/표 */
    --font-size-md:   13.5px; /* 일반 본문 */
    --font-size-lg:   16px;   /* 강조 본문 */
    --font-size-xl:   20px;   /* 차종명 등 카드 헤더 */
    --font-size-2xl:  24px;   /* 견적서 메인 타이틀 */

    /* Shadow */
    --shadow-sm:  0 1px 2px rgba(0,0,0,0.04);
    --shadow:     0 2px 8px rgba(0,0,0,0.08);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
    --shadow-lg:  0 8px 24px rgba(0,0,0,0.12);
    --shadow-xl:  0 20px 60px rgba(0,0,0,0.20);

    /* Transitions */
    --t-fast: .12s;
    --t-base: .15s;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink-1);
    letter-spacing: -0.2px; line-height: 1.5;
    font-size: 13.5px;
    -webkit-text-size-adjust: 100%;
    margin: 0;
    display: grid;
    /* 3패널 ratio 고정 — 좌(차량):중(견적):우(채팅) = 28:52:20.
       viewport 폭에 비례해 동시에 축소·확대. discrete breakpoint 없음. */
    grid-template-columns: minmax(0, 28fr) minmax(0, 52fr) minmax(0, 20fr);
    grid-template-rows: 44px 1fr;
    gap: 0;
    height: 100vh;
    overflow: hidden;
  }
  /* 톱바 — 화이트 + 헤어라인만 */
  .global-topbar {
    grid-column: 1 / -1;
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px; height: 44px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .ph { font-size: 14px; line-height: 1; }
  .global-topbar__brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 500; letter-spacing: -0.2px; color: var(--ink-1);
  }
  .global-topbar__brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-1); }
  .global-topbar__hint { font-size: 12px; color: var(--ink-4); padding-left: 12px; }
  .global-topbar .spacer { flex: 1; }
  .global-topbar__actions { display: flex; gap: 2px; }
  /* 톱바 버튼 — 박스 없이 텍스트 + 아이콘 (hover시 옅은 회색 bg만) */
  /* === 상단바 버튼 통일 규격 === */
  .gt-btn {
    height: 30px; padding: 0 11px;
    border: 0; border-radius: var(--radius);
    font-size: 12px; font-weight: 400;
    line-height: 1; letter-spacing: -0.2px;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: var(--ink-2);
    white-space: nowrap;
    transition: background var(--t-fast), color var(--t-fast);
  }
  .gt-btn i {
    font-size: 14px; line-height: 1;
    flex-shrink: 0;
  }
  .gt-btn:hover { background: var(--accent-soft); color: var(--ink-1); }
  /* outline = 기본 (회색 텍스트, 모든 보조 액션 통일) */
  .gt-btn.outline { color: var(--ink-2); }
  /* primary = 메인 강조 (빨강, 견적바구니 1개만) */
  .gt-btn.primary {
    color: var(--brand); font-weight: 500;
    background: var(--brand-50);
  }
  .gt-btn.primary:hover { background: var(--brand-100); }

  /* 그룹 구분선 */
  .gt-divider {
    width: 1px; height: 18px;
    background: var(--line);
    margin: 0 4px;
  }

  /* 견적바구니 카운트 뱃지 — primary 버튼 안 인라인 */
  .cart-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    margin-left: 2px;
    border-radius: var(--radius-pill);
    background: var(--brand); color: #fff;
    font-size: 10.5px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: background .15s;
  }
  .cart-badge.is-empty {
    background: rgba(225, 20, 30, 0.25);
    color: #fff;
  }
  @media (max-width: 1024px) {
    body { grid-template-columns: 1fr; }
  }
  .wrap {
    max-width: none; margin: 0; background: #fff;
    border-right: 1px solid #eee;
    height: 100%; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    padding-bottom: 40px;
  }
  .wrap::-webkit-scrollbar { width: 6px; }
  .wrap::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
  .wrap::-webkit-scrollbar-track { background: transparent; }

  /* 인풋/드롭다운 — 밑줄만 있는 샤프한 스타일 */
  .step-dd {
    display: none;
    width: 100%;
    height: 32px;
    padding: 0 0 0 2px;
    border: none;
    border-bottom: 1px solid var(--line-2);
    border-radius: 0;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-1);
    font-family: inherit;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%23a3a3a3' stroke-width='1.5' stroke-linecap='round'><polyline points='3 5 6 8 9 5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 4px center;
    background-size: 11px 11px;
    padding-right: 22px;
    transition: border-color .12s;
  }
  .step-dd:hover { border-bottom-color: var(--ink-3); }
  .step-dd:focus { border-bottom-color: var(--ink-1); }
  .step-dd:disabled { color: var(--ink-4); cursor: not-allowed; border-bottom-style: dashed; }
  @media (min-width: 1025px) {
    /* 좌:차량 / 중:견적 / 우:계약+채팅 — 미니멀 톤 (canvas만) */
    body { background: var(--bg); }
    .quote-panel { background: transparent !important; padding: 8px 24px 24px !important; }

    /* breadcrumb — 차량 선택 후만 의미. 비어 보이면 숨김 (JS 가 조정) */
    .breadcrumb {
      background: #fff !important; border: 1px solid var(--line) !important;
      border-radius: 8px !important; padding: 5px 12px !important; margin-bottom: 6px !important;
      font-size: 10.5px !important; min-height: 0 !important;
    }
    .breadcrumb:empty { display: none !important; }
    .crumb { padding: 2px 8px !important; }
    /* 옵션 카드 — 트림 미선택 시 안내 */
    #sec-options:has(#options:empty) .step-title::after {
      content: ' (트림 선택 후 표시)'; color: #ccc; font-weight: 400; font-size: 9px;
    }
    /* 색상 카드 — 모델 미선택 시 안내 */
    #sec-color:has(#colors:empty) .step-title::after {
      content: ' (모델 선택 후 표시)'; color: #ccc; font-weight: 400; font-size: 9px;
    }

    /* 좌측 통합 패널 — 카드 chrome 제거, 세로 hairline만 (우측 컬럼과 구분) */
    .wrap {
      background: transparent !important;
      border: none !important;
      border-right: 1px solid var(--line) !important;
      border-radius: 0 !important;
      padding: 8px 20px 20px !important;
      margin: 0 !important;
      overflow-y: auto;
      height: 100% !important;
    }
    /* 모든 섹션 동일 여백 — 라인 없음, 위아래 12px 여백만 */
    section {
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      padding: 12px 0 !important;
      margin-bottom: 0 !important;
      transition: opacity .25s;
    }
    /* 첫 번째/마지막 섹션은 위/아래 여백 절반 — 패널 끝과의 간격 */
    .wrap > section:first-of-type { padding-top: 8px !important; }
    .wrap > section:last-of-type { padding-bottom: 8px !important; }
    /* 미해제 cascade 섹션 — 흐리게 (제조사 → 모델 → 세부모델 → 트림 진행 표시) */
    section.hidden { display: block !important; opacity: 0.35; pointer-events: none; }
    /* 다음에 입력해야 할 섹션 — 브랜드 컬러 강조 */
    section.is-current .step-title {
      color: var(--brand);
      font-weight: 500;
    }
    .step-title {
      font-size: 11.5px; margin-bottom: 6px;
      letter-spacing: 0; color: var(--ink-3); font-weight: 500;
      text-transform: none;
    }
    .group-title { display: none; }

    /* dropdown 컴팩트 */
    .step-dd { display: block; height: 32px; font-size: 12.5px; padding: 0 10px; padding-right: 28px; }

    /* 모든 섹션 padding 12px 0 으로 통일 (위 section 규칙으로 일괄) */
    .colors { gap: 5px !important; }
    .color { padding: 4px 8px !important; font-size: 11px !important; }
    /* 색상 카드 swatch 그리드 숨김 (dropdown 만 사용) */
    #sec-color #colors { display: none !important; }
    .color-wrap .step-dd { padding-left: 30px !important; }
    .color-wrap:has(.step-dd:disabled) .color-swatch-mini { opacity: 0.3; }
    /* accordion summary (좌측 STEP 9 용품) */
    .step-title-summary {
      list-style: none; cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 6px;
    }
    .step-title-summary::-webkit-details-marker { display: none; }
    .step-title-summary .caret {
      margin-left: auto;
      width: 11px; height: 11px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%23a3a3a3' stroke-width='1.5' stroke-linecap='round'><polyline points='3 5 6 8 9 5'/></svg>");
      background-repeat: no-repeat; background-position: center; background-size: 11px 11px;
      transition: transform .15s;
    }
    details[open] > .step-title-summary .caret { transform: rotate(180deg); }
    .step-title-text { font-size: 11.5px; letter-spacing: 0; color: var(--ink-3); font-weight: 500; }
    .step-title-text b { color: var(--brand); font-weight: 500; }

    /* 하단바 숨김 */
    .total-bar { display: none !important; }

    /* 우측 패널 카드 — customer-output만 살아있음 */
    .quote-panel .customer-output { margin-bottom: 8px; }

    /* 4기간 카드 — 폭에 맞춰 auto-fit (좁으면 2x2, 충분하면 1x4) */
    .terms-grid {
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) !important;
      gap: 6px !important; margin-bottom: 8px !important;
    }
    .term-card { padding: 10px 10px 8px !important; }
    .term-card__monthly { font-size: 18px !important; }
    .term-card__row { font-size: 10.5px !important; }

    /* ===== 필드 row — 라벨 좌측 / 인풋 우측 가로 레이아웃 (단일 인풋 섹션만) ===== */
    #sec-manufacturer, #sec-model, #sec-variant, #sec-trim,
    #sec-color, #sec-delivery, #sec-tint {
      display: grid !important;
      grid-template-columns: 96px 1fr;
      align-items: center;
      column-gap: 12px;
      row-gap: 4px;
      padding: 12px 0 !important;  /* 다른 섹션과 동일 여백 */
    }
    #sec-manufacturer > .step-title, #sec-model > .step-title,
    #sec-variant > .step-title, #sec-trim > .step-title,
    #sec-color > .step-title, #sec-delivery > .step-title,
    #sec-tint > .step-title {
      grid-column: 1;
      margin-bottom: 0 !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #sec-manufacturer > *:not(.step-title),
    #sec-model > *:not(.step-title),
    #sec-variant > *:not(.step-title),
    #sec-trim > *:not(.step-title),
    #sec-color > *:not(.step-title),
    #sec-delivery > *:not(.step-title),
    #sec-tint > *:not(.step-title) {
      grid-column: 2;
      min-width: 0;
    }
  }
  /* dropdown 은 모든 화면에서 항상 보임 (모바일/웹 동일) */
  .step-dd { display: block; }

  /* 색상 swatch — 모든 화면에서 동작 */
  .color-wrap { position: relative; display: block; }
  .color-swatch-mini {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.28);
    background: var(--ink-4);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    pointer-events: none; z-index: 2;
    display: block;
  }
  /* STEP 1~4 카드 그리드 항상 숨김 (dropdown 만 사용) */
  #sec-manufacturer .grid-2,
  #sec-model .grid-2,
  #sec-variant .grid-1,
  #sec-trim .grid-1,
  #sec-trim #trim-detail { display: none !important; }
  /* 견적서 모달 */
  .quote-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .quote-modal-backdrop.open { display: flex; }
  .quote-modal {
    background: var(--bg); border-radius: var(--radius-lg);
    max-width: 880px; width: 96%; max-height: 92vh;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: var(--shadow-xl);
  }
  .quote-modal__body {
    flex: 1; overflow-y: auto;
    background: #e8e8e8;
    padding: 20px;
  }
  .quote-modal__head {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 18px; background: #fafafa; border-bottom: 1px solid #eee;
    font-size: 12.5px; font-weight: 500; color: var(--brand);
  }
  .quote-modal__head .actions { margin-left: auto; display: flex; gap: 6px; }
  .quote-modal__opt {
    display: inline-flex; align-items: center; gap: 4px;
    margin-left: 12px; padding: 4px 8px;
    font-size: 11.5px; color: var(--ink-3); font-weight: 400;
    cursor: pointer; user-select: none;
    border-radius: var(--radius-sm);
  }
  .quote-modal__opt:hover { color: var(--ink-1); background: var(--accent-soft); }
  .quote-modal__opt input { margin: 0; accent-color: var(--ink-1); cursor: pointer; }
  /* 모달 헤더 버튼 — 박스 없이 통일 */
  .quote-modal__head button {
    height: 28px; padding: 0 8px;
    border: 0; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 400;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px;
    background: transparent; color: var(--ink-2);
    transition: background .12s, color .12s;
  }
  .quote-modal__head button:hover { background: var(--accent-soft); color: var(--ink-1); }
  .quote-modal__head button.outline { color: var(--ink-2); }
  .quote-modal__head button.primary { color: var(--brand); font-weight: 500; }
  .quote-modal__head button.primary:hover { background: var(--brand-50); color: var(--brand); }
  .quote-modal__head button.close { color: var(--ink-3); font-size: 16px; }
  .quote-modal__head button.close:hover { background: var(--accent-soft); color: var(--ink-1); }
  .quote-modal__body { flex: 1; overflow-y: auto; padding: 0; }
  .breadcrumb {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 12px 20px; background: #fafafa;
    font-size: 11px; color: #888;
    border-bottom: 1px solid #eee;
  }
  .crumb {
    background: #fff; border: 1px solid #e0e0e0;
    padding: 4px 10px; border-radius: 12px;
  }
  .crumb.filled { color: var(--brand); border-color: var(--brand); font-weight: 400; }
  .crumb .label { color: #aaa; margin-right: 4px; font-weight: 400; }
  .crumb.filled .label { color: var(--brand); }
  section { padding: 20px; border-bottom: 8px solid #f5f5f5; }
  .step-title { font-size: 11px; color: #999; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; }
  .step-title b { color: var(--brand); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-1 { display: flex; flex-direction: column; gap: 6px; }
  .card {
    border: 1px solid var(--line-2); border-radius: 8px;
    padding: 14px 12px; cursor: pointer; background: #fff;
    transition: border-color .15s, background .15s;
    text-align: left; font-family: inherit; width: 100%;
  }
  .card.active { border-color: var(--brand); background: var(--brand-50); }
  .card.disabled { opacity: 0.4; cursor: not-allowed; background: var(--bg-soft); }
  .card .name { font-weight: 400; font-size: 13px; }
  .card .sub { font-size: 11px; color: var(--ink-3); margin-top: 3px; line-height: 1.5; }
  .card .price { font-size: 12.5px; color: var(--brand); font-weight: 600; margin-top: 6px; }
  .trim-row {
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--line-2); border-radius: 8px;
    padding: 14px; cursor: pointer; background: #fff;
    transition: border-color .15s, background .15s;
  }
  .trim-row.active { border-color: var(--brand); background: var(--brand-50); }
  .trim-row .info { flex: 1; }
  .trim-row .info .name { font-weight: 400; font-size: 14px; }
  .trim-row .info .meta { font-size: 11px; color: var(--ink-3); margin-top: 3px; }
  .trim-row .price { font-weight: 600; font-size: 13px; white-space: nowrap; }
  .specs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }

// =============================================================================
// 📋 VEHICLE_DB 데이터 스키마 명세
// =============================================================================
//
// 데이터 구조 트리:
//   VEHICLE_DB
//     └ manufacturers[]              제조사 배열
//         └ models[]                 모델 배열 (현대/기아/제네시스 등)
//             └ variants[]           변형 배열 (가솔린/하이브리드/LPi 등 파워트레인+인승)
//                 ├ trims[]          트림 배열 (모던/프리미엄/캘리그래피 등)
//                 │   └ available_options[]   해당 트림에서 선택 가능한 option_id 배열

//             └ exterior_colors[]    외장 컬러 배열
//
// 가격 기준 (전 차종 통일):
//   - 단위: 만원 (예: 2516 = 2,516만원)
//   - 가솔린/LPG/디젤: 개별소비세 3.5% 인하 적용 후 가격
//   - 하이브리드/친환경: 친환경차 세제혜택 적용 후 가격
//   - 옵션 가격: 개소세 감면 전 기준 (제조사 PDF 그대로)
//
// 데이터 출처 우선순위:
//   1. 제조사 공식 가격표 PDF (hyundai.com / kia.com / genesis.com)
//   2. 출시 보도자료 (한국자동차기자협회 등)
//   3. 카눈/카이즈유/다나와 등 자동차 정보 사이트 (검증용)
//
// =============================================================================
// JSDoc 타입 정의 - 새 모델 추가 시 이 스펙 준수
// =============================================================================

/**
 * @typedef {Object} Manufacturer
 * @property {string} manufacturer_id   - 제조사 ID, 영문 lowercase ("hyundai", "kia", "genesis")
 * @property {string} manufacturer_name - 제조사 표시명 ("현대", "기아", "제네시스")
 * @property {Model[]} models           - 모델 배열
 */

/**
 * @typedef {Object} Model
 * @property {string} model_id          - 모델 ID, 영문 lowercase, 띄어쓰기 없음 ("casper", "avante", "santafe")
 * @property {string} model_name        - 모델 표시명 한글 ("캐스퍼", "아반떼", "팰리세이드")
 * @property {string} category          - 차종 분류 ("준중형 세단", "중형 SUV", "1톤 트럭", "MPV" 등)
 *                                         페이스리프트 예정 시 "⚠ YYYY.MM.DD 차종명 출시 — 갱신 예정" 형식 추가 가능
 * @property {number} year              - 연식 (2024, 2025, 2026)
 * @property {Variant[]} variants       - 변형 배열 (파워트레인 × 인승 단위로 분리)
 * @property {Color[]} exterior_colors  - 외장 컬러 배열
 */

/**
 * @typedef {Object} Variant
 * @property {string} variant_id        - 변형 ID, 영문 snake_case ("gasoline_1_6t", "hybrid_1_6t", "lpg_supercab_long_2wd")
 * @property {string} variant_name      - 변형 표시명 ("가솔린 1.6 터보", "하이브리드 1.6T", "라운지 LPi 7인승")
 * @property {string} vehicle_type      - 차량 유형 ("세단", "RV", "RV (하이브리드)", "MPV", "1톤 트럭", "경형SUV", "RV (대형)")
 * @property {string} fuel              - 연료 ("가솔린", "디젤", "LPG", "하이브리드(가솔린)", "전기")
 * @property {number} displacement_cc   - 배기량 (cc)
 * @property {string} transmission      - 변속기 ("자동 8단", "7단 DCT", "스마트스트림 IVT", "6단 자동", "6단 수동")
 * @property {Trim[]} trims             - 트림 배열
 * @property {Object<string,Option>} options_master - 옵션 마스터 (option_id → Option 객체)
 *                                         variant 레벨에 둠 (트림별로 가격 다른 옵션은 별도 variant로 분리)
 * @property {ExclusiveGroup[]} [exclusive_groups] - 배타 그룹 (한 그룹에서 동시 하나만 선택)
 *                                         예: [{ id: "wheel", label: "휠", members: ["w_19", "w_20"] }]
 * @property {Object<string,string[]>} [option_excludes] - 포함 관계 (A 선택 시 B 자동 해제+비활성)
 *                                         예: { "popular_2": ["popular_1", "driving_assist_2"] }
 *                                         popular_2가 popular_1+driving_assist_2를 포함하므로 동시 선택 방지
 */

/**
 * @typedef {Object} ExclusiveGroup
 * @property {string} id                - 그룹 ID ("wheel", "seats", "popular_pkg")
 * @property {string} label             - 그룹 표시명 ("휠 사이즈", "좌석 구성", "파퓰러 패키지")
 * @property {string[]} members         - 그룹 멤버 option_id 배열 (이 중 하나만 선택 가능)
 */

/**
 * @typedef {Object} Trim
 * @property {string} trim_id           - 트림 ID, 영문 lowercase ("modern", "premium", "inspiration", "calligraphy")
 *                                         특수 변형: "n_line", "h_pick", "black_exterior", "black_ink"
 * @property {string} name              - 트림 표시명 한글 ("모던", "프리미엄", "캘리그래피 블랙 잉크")
 * @property {number} seats             - 좌석 수 (정수, 5/7/9/11 등)
 * @property {number} base_price        - 기본 가격 (만원, 개소세 3.5% 또는 세제혜택 후)
 * @property {string} engine            - 엔진 사양 ("스마트스트림 G 2.5 T-GDI (281hp)", "스마트스트림 LPi 3.5")
 * @property {FuelEconomy} fuel_economy - 연비 객체
 * @property {string[]} standard_features      - 표준 사양 문자열 배열 (요약 형태, "+상위트림 대비 추가" 표기 가능)
 * @property {string[]} available_options      - 선택 가능한 option_id 배열 (options_master 키 참조)
 */

/**
 * @typedef {Object} Option
 * @property {string} name              - 옵션 표시명 ("HTRAC (4WD)", "현대 스마트센스 Ⅰ")
 *                                         선행 옵션이 있을 경우 이름 앞에 "└" 표기 (예: "└ 파킹어시스트")
 * @property {string} [sub]             - 부가 설명 (선택, 어떤 사양이 포함되는지)
 * @property {number} price             - 옵션 가격 (만원)
 * @property {string[]} [requires]      - 이 옵션 선택을 위해 사전 선택 필요한 option_id 배열
 *                                         (예: 파킹어시스트 → ["cluster_123"] 필요)
 * @property {Object<string,string[]>} [requires_in_trim] - 트림별로 다른 선행 조건 (선택)
 */

/**
 * @typedef {Object} FuelEconomy
 * @property {number} combined          - 복합 연비 (km/L, 전기차는 km/kWh)
 * @property {number} [urban]           - 도심 연비 (선택)
 * @property {number} [highway]         - 고속도로 연비 (선택)
 * @property {number} [co2]             - CO2 배출량 (g/km, 선택)
 */

/**
 * @typedef {Object} Color
 * @property {string} name              - 컬러 이름 ("아틀라스 화이트", "어비스 블랙 펄")
 *                                         특수 컬러: "이름(무광)", "이름 (트림명 전용)" 형식 가능
 * @property {string} code              - 제조사 컬러 코드 ("SAW", "A2B")
 * @property {string} hex               - HEX 색상값 ("#f0f0ee")
 * @property {number} price             - 추가 가격 (만원, 기본 컬러는 0)
 */

// =============================================================================
// 데이터 검증 함수 - 새 모델 추가 후 validateVehicleDB() 실행 권장
// =============================================================================

function validateOption(option, optionId) {
  const errors = [];
  if (typeof option.name !== 'string' || !option.name) errors.push(`option[${optionId}].name 누락`);
  if (typeof option.price !== 'number') errors.push(`option[${optionId}].price 숫자 아님`);
  if (option.requires && !Array.isArray(option.requires)) errors.push(`option[${optionId}].requires 배열 아님`);
  if (option.trim_prices !== undefined) {
    if (typeof option.trim_prices !== 'object' || Array.isArray(option.trim_prices)) {
      errors.push(`option[${optionId}].trim_prices 객체 아님`);
    } else {
      for (const [trimId, price] of Object.entries(option.trim_prices)) {
        if (typeof price !== 'number') errors.push(`option[${optionId}].trim_prices[${trimId}] 숫자 아님`);
      }
    }
  }
  return errors;
}

function validateTrim(trim, ctx) {
  const errors = [];
  const required = ['trim_id', 'name', 'seats', 'engine', 'fuel_economy', 'standard_features', 'available_options'];
  for (const f of required) {
    if (trim[f] === undefined || trim[f] === null) errors.push(`${ctx}.trim[${trim.trim_id || '?'}].${f} 누락`);
  }
  // base_price OR (base_price_5 + base_price_3_5)
  const hasOldPrice = typeof trim.base_price === 'number';
  const hasNewPrice = typeof trim.base_price_5 === 'number' && typeof trim.base_price_3_5 === 'number';
  if (!hasOldPrice && !hasNewPrice) {
    errors.push(`${ctx}.trim[${trim.trim_id}].base_price (또는 base_price_5+base_price_3_5) 누락`);
  }
  if (typeof trim.base_price === 'number' && (trim.base_price < 1000 || trim.base_price > 30000)) {
    errors.push(`${ctx}.trim[${trim.trim_id}].base_price 비정상 (${trim.base_price}만원)`);
  }
  if (typeof trim.base_price_5 === 'number' && (trim.base_price_5 < 1000 || trim.base_price_5 > 30000)) {
    errors.push(`${ctx}.trim[${trim.trim_id}].base_price_5 비정상 (${trim.base_price_5}만원)`);
  }
  if (typeof trim.base_price_3_5 === 'number' && (trim.base_price_3_5 < 1000 || trim.base_price_3_5 > 30000)) {
    errors.push(`${ctx}.trim[${trim.trim_id}].base_price_3_5 비정상 (${trim.base_price_3_5}만원)`);
  }
  if (trim.fuel_economy && typeof trim.fuel_economy.combined !== 'number') {
    errors.push(`${ctx}.trim[${trim.trim_id}].fuel_economy.combined 누락`);
  }
  if (!Array.isArray(trim.standard_features)) errors.push(`${ctx}.trim[${trim.trim_id}].standard_features 배열 아님`);
  if (!Array.isArray(trim.available_options)) errors.push(`${ctx}.trim[${trim.trim_id}].available_options 배열 아님`);
  return errors;
}

function validateVariant(variant, ctx) {
  const errors = [];
  const required = ['variant_id', 'variant_name', 'vehicle_type', 'fuel', 'displacement_cc', 'transmission', 'trims', 'options_master'];
  for (const f of required) {
    if (variant[f] === undefined || variant[f] === null) errors.push(`${ctx}.variant[${variant.variant_id || '?'}].${f} 누락`);
  }
  if (!Array.isArray(variant.trims) || variant.trims.length === 0) {
    errors.push(`${ctx}.variant[${variant.variant_id}].trims 비어있음`);
  }
  if (typeof variant.options_master !== 'object' || !variant.options_master) {
    errors.push(`${ctx}.variant[${variant.variant_id}].options_master 객체 아님`);
  } else {
    // 옵션 마스터 각각 검증
    for (const [oid, opt] of Object.entries(variant.options_master)) {
      errors.push(...validateOption(opt, oid));
    }
    // 트림의 available_options가 모두 options_master에 있는지 확인
    if (Array.isArray(variant.trims)) {
      for (const trim of variant.trims) {
        if (Array.isArray(trim.available_options)) {
          for (const optId of trim.available_options) {
            if (!variant.options_master[optId]) {
              errors.push(`${ctx}.variant[${variant.variant_id}].trim[${trim.trim_id}].available_options 에 [${optId}] 있으나 options_master에 없음`);
            }
          }
        }
      }
    }
    // 옵션의 requires가 options_master 내에 존재하는지 확인
    for (const [oid, opt] of Object.entries(variant.options_master)) {
      if (Array.isArray(opt.requires)) {
        for (const reqId of opt.requires) {
          if (!variant.options_master[reqId]) {
            errors.push(`${ctx}.variant[${variant.variant_id}].options_master[${oid}].requires [${reqId}] 가 options_master에 없음`);
          }
        }
      }
    }
    
    // exclusive_groups 검증
    if (variant.exclusive_groups !== undefined) {
      if (!Array.isArray(variant.exclusive_groups)) {
        errors.push(`${ctx}.variant[${variant.variant_id}].exclusive_groups 배열 아님`);
      } else {
        const seenInGroups = new Set();
        for (const grp of variant.exclusive_groups) {
          if (!grp.id || !grp.label || !Array.isArray(grp.members)) {
            errors.push(`${ctx}.variant[${variant.variant_id}].exclusive_groups[${grp.id || '?'}] 필드 누락 (id/label/members)`);
            continue;
          }
          if (grp.members.length < 2) {
            errors.push(`${ctx}.variant[${variant.variant_id}].exclusive_groups[${grp.id}] members 2개 미만 (배타 그룹 의미 없음)`);
          }
          for (const optId of grp.members) {
            if (!variant.options_master[optId]) {
              errors.push(`${ctx}.variant[${variant.variant_id}].exclusive_groups[${grp.id}] 멤버 [${optId}] 가 options_master에 없음`);
            }
            if (seenInGroups.has(optId)) {
              errors.push(`${ctx}.variant[${variant.variant_id}].exclusive_groups [${optId}] 가 여러 그룹에 중복 소속`);
            }
            seenInGroups.add(optId);
          }
        }
      }
    }
    
    // option_excludes 검증 (A가 B를 포함하므로 동시 선택 금지)
    if (variant.option_excludes !== undefined) {
      if (typeof variant.option_excludes !== 'object') {
        errors.push(`${ctx}.variant[${variant.variant_id}].option_excludes 객체 아님`);
      } else {
        for (const [oid, excludedIds] of Object.entries(variant.option_excludes)) {
          if (!variant.options_master[oid]) {
            errors.push(`${ctx}.variant[${variant.variant_id}].option_excludes[${oid}] 키가 options_master에 없음`);
          }
          if (!Array.isArray(excludedIds)) {
            errors.push(`${ctx}.variant[${variant.variant_id}].option_excludes[${oid}] 값이 배열 아님`);
            continue;
          }
          for (const excId of excludedIds) {
            if (!variant.options_master[excId]) {
              errors.push(`${ctx}.variant[${variant.variant_id}].option_excludes[${oid}] 의 [${excId}] 가 options_master에 없음`);
            }
            if (excId === oid) {
              errors.push(`${ctx}.variant[${variant.variant_id}].option_excludes[${oid}] 자기 자신을 exclude`);
            }
          }
        }
      }
    }
  }
  // 트림 검증
  if (Array.isArray(variant.trims)) {
    for (const trim of variant.trims) {
      errors.push(...validateTrim(trim, `${ctx}.variant[${variant.variant_id}]`));
    }
  }
  return errors;
}

function validateModel(model, ctx) {
  const errors = [];
  const required = ['model_id', 'model_name', 'category', 'year', 'variants', 'exterior_colors'];
  for (const f of required) {
    if (model[f] === undefined || model[f] === null) errors.push(`${ctx}.model[${model.model_id || '?'}].${f} 누락`);
  }
  if (Array.isArray(model.variants)) {
    for (const variant of model.variants) {
      errors.push(...validateVariant(variant, `${ctx}.model[${model.model_id}]`));
    }
  }
  if (Array.isArray(model.exterior_colors)) {
    for (const color of model.exterior_colors) {
      if (!color.name || !color.code || !color.hex || typeof color.price !== 'number') {
        errors.push(`${ctx}.model[${model.model_id}].color[${color.name || '?'}] 필드 누락`);
      }
    }
  }
  return errors;
}

function validateVehicleDB(db) {
  const errors = [];
  if (!db || !Array.isArray(db.manufacturers)) {
    return ['VEHICLE_DB.manufacturers 배열 아님'];
  }
  for (const mfr of db.manufacturers) {
    if (!mfr.manufacturer_id || !mfr.manufacturer_name) {
      errors.push(`Manufacturer 필수 필드 누락: ${JSON.stringify(mfr).slice(0, 100)}`);
      continue;
    }
    if (!Array.isArray(mfr.models)) {
      errors.push(`Manufacturer[${mfr.manufacturer_id}].models 배열 아님`);
      continue;
    }
    for (const model of mfr.models) {
      errors.push(...validateModel(model, `mfr[${mfr.manufacturer_id}]`));
    }
  }
  return errors;
}

// STATE & HELPERS
// ============================================================
let state = { manufacturer: null, model: null, variant: null, trim: null, options: new Set(), color: null, tax_rate: '5' };
const $ = (id) => document.getElementById(id);

const getManufacturer = () => VEHICLE_DB.manufacturers.find(m => m.manufacturer_id === state.manufacturer);
const getModel = () => getManufacturer()?.models.find(x => x.model_id === state.model);
const getVariant = () => getModel()?.variants.find(v => v.variant_id === state.variant);
const getTrim = () => getVariant()?.trims.find(t => t.trim_id === state.trim);
const getOptionsMaster = () => getVariant()?.options_master || {};

// 트림별 옵션 가격: opt.trim_prices[trimId]가 있으면 그 가격, 없으면 opt.price
function getOptionPrice(opt, trimId) {
  if (opt && opt.trim_prices && trimId != null && (trimId in opt.trim_prices)) {
    return opt.trim_prices[trimId];
  }
  return opt?.price ?? 0;
}

// 트림 base_price: state.tax_rate에 따라 5% 또는 3.5% 가격 반환
// 호환성: 두 필드 없으면 trim.base_price 사용
function getTrimPrice(trim, taxRate) {
  if (!trim) return 0;
  const rate = taxRate || state.tax_rate || '5';
  if (rate === '5' && typeof trim.base_price_5 === 'number') return trim.base_price_5;
  if (rate === '3_5' && typeof trim.base_price_3_5 === 'number') return trim.base_price_3_5;
  return trim.base_price ?? trim.base_price_3_5 ?? trim.base_price_5 ?? 0;
}

function isOptionEnabled(optId) {
  const om = getOptionsMaster();
  const opt = om[optId];
  if (!opt) return false;
  // requires 충족 여부
  if (opt.requires && !opt.requires.every(req => state.options.has(req))) return false;
  if (opt.requires_in_trim?.[state.trim] && !opt.requires_in_trim[state.trim].every(req => state.options.has(req))) return false;
  // 다른 선택된 옵션이 나를 exclude하고 있으면 비활성
  const v = getVariant();
  if (v?.option_excludes) {
    for (const [parentId, excludedIds] of Object.entries(v.option_excludes)) {
      if (state.options.has(parentId) && excludedIds.includes(optId)) return false;
    }
  }
  return true;
}

// 옵션이 어떤 부모 옵션에 의해 포함되어 비활성화된 경우 부모 옵션 ID 반환
function getExcludingParent(optId) {
  const v = getVariant();
  if (!v?.option_excludes) return null;
  for (const [parentId, excludedIds] of Object.entries(v.option_excludes)) {
    if (state.options.has(parentId) && excludedIds.includes(optId)) {
      return parentId;
    }
  }
  return null;
}

// 옵션이 속한 배타 그룹 반환
function getExclusiveGroup(optId) {
  const v = getVariant();
  if (!v?.exclusive_groups) return null;
  return v.exclusive_groups.find(g => g.members.includes(optId)) || null;
}

function getMinPrice(model) {
  let min = Infinity;
  model.variants.forEach(v => v.trims.forEach(t => {
    const p = getTrimPrice(t, state.tax_rate);
    if (p < min) min = p;
  }));
  return min === Infinity ? 0 : min;
}

// ============================================================
document.addEventListener('click', (e) => {
  if (e.target.closest('#tax-toggle') || e.target.closest('#qp-tax-toggle')) {
    state.tax_rate = state.tax_rate === '3_5' ? '5' : '3_5';
    const label = state.tax_rate === '3_5' ? '3.5%' : '5%';
    document.getElementById('tax-label').textContent = label;
    const qpLabel = document.getElementById('qp-tax-label');
    if (qpLabel) qpLabel.textContent = label;
    render();
    return;
  }
  if (e.target.closest('#reset-btn')) {
    state = { manufacturer: null, model: null, variant: null, trim: null, options: new Set(), color: null, tax_rate: state.tax_rate || '5' };
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  const mfrBtn = e.target.closest('[data-mfr]');
  if (mfrBtn && !mfrBtn.disabled) {
    if (state.manufacturer !== mfrBtn.dataset.mfr) {
      state.manufacturer = mfrBtn.dataset.mfr;
      state.model = state.variant = state.trim = state.color = null;
      state.options.clear();
    }
    render(); return;
  }
  const modelBtn = e.target.closest('[data-model]');
  if (modelBtn) {
    if (state.model !== modelBtn.dataset.model) {
      state.model = modelBtn.dataset.model;
      state.variant = state.trim = state.color = null;
      state.options.clear();
    }
    render(); return;
  }
  const variantBtn = e.target.closest('[data-variant]');
  if (variantBtn) {
    if (state.variant !== variantBtn.dataset.variant) {
      state.variant = variantBtn.dataset.variant;
      state.trim = state.color = null;
      state.options.clear();
    }
    render(); return;
  }
  const trimRow = e.target.closest('[data-trim]');
  if (trimRow) {
    if (state.trim !== trimRow.dataset.trim) {
      state.trim = trimRow.dataset.trim;
      state.options.clear();
    }
    render(); return;
  }
  const colorCard = e.target.closest('[data-color]');
  if (colorCard) {
    state.color = parseInt(colorCard.dataset.color);
    render(); return;
  }
});

document.addEventListener('change', (e) => {
  if (e.target.matches('.option-row input[type="checkbox"]')) {
    const id = e.target.closest('[data-opt]').dataset.opt;
    const om = getOptionsMaster();
    const v = getVariant();
    if (e.target.checked) {
      // 1. 같은 배타 그룹의 다른 옵션 해제
      const group = getExclusiveGroup(id);
      if (group) {
        for (const memberId of group.members) {
          if (memberId !== id) state.options.delete(memberId);
        }
      }
      // 2. 이 옵션이 exclude하는 옵션들 자동 해제 (상위 패키지가 하위 패키지/옵션을 포함)
      if (v?.option_excludes?.[id]) {
        for (const excId of v.option_excludes[id]) {
          state.options.delete(excId);
        }
      }
      // 3. exclude된 하위 옵션들의 종속 옵션도 정리 (예: 파킹어시스트가 navi_1에 종속이고 navi_1이 해제되면)
      Object.entries(om).forEach(([k, opt]) => {
        if (opt.requires?.some(r => !state.options.has(r))) state.options.delete(k);
        if (opt.requires_in_trim?.[state.trim]?.some(r => !state.options.has(r))) state.options.delete(k);
      });
      state.options.add(id);
    } else {
      state.options.delete(id);
      // 이 옵션을 requires로 가진 종속 옵션 해제 (기존 동작)
      Object.entries(om).forEach(([k, opt]) => {
        if (opt.requires?.includes(id) || opt.requires_in_trim?.[state.trim]?.includes(id)) {
          state.options.delete(k);
        }
      });
    }
    render();
  }
});

function renderBreadcrumb() {
  const m = getManufacturer();
  const model = getModel();
  const variant = getVariant();
  const trim = getTrim();
  const color = state.color !== null ? model?.exterior_colors[state.color] : null;
  // 차량 미선택 시 breadcrumb 자체를 비워서 :empty 로 숨김
  if (!m) { $('breadcrumb').innerHTML = ''; return; }
  const crumbs = [
    { label: "제조사", value: m?.manufacturer_name },
    { label: "모델", value: model?.model_name },
    { label: "세부", value: variant?.variant_name },
    { label: "트림", value: trim?.name },
    { label: "옵션", value: state.options.size > 0 ? `${state.options.size}개` : null },
    { label: "컬러", value: color?.name }
  ];
  $('breadcrumb').innerHTML = crumbs.map(c => `
    <span class="crumb ${c.value ? 'filled' : ''}">
      <span class="label">${c.label}</span>${c.value || '—'}
    </span>`).join('');
}

function renderManufacturers() {
  if (!$('manufacturers')) return;  // Vue가 처리
  $('manufacturers').innerHTML = VEHICLE_DB.manufacturers.map(m => {
    const count = m.models.length;
    return `<button class="card ${state.manufacturer === m.manufacturer_id ? 'active' : ''} ${count === 0 ? 'disabled' : ''}" 
      data-mfr="${m.manufacturer_id}" ${count === 0 ? 'disabled' : ''}>
      <div class="name">${m.manufacturer_name}</div>
      <div class="sub">${count > 0 ? `${count}개 모델` : '준비중'}</div>
    </button>`;
  }).join('');
}

function renderModels() {
  // Vue VehicleCascade가 처리 — inline 로직 skip
  if (!$('models')) return;
  const sec = $('sec-model');
  if (!state.manufacturer) {
    sec?.classList.add('hidden');
    $('models').innerHTML = '';
    return;
  }
  sec.classList.remove('hidden');
  $('models').innerHTML = getManufacturer().models.map(model => `
    <button class="card ${state.model === model.model_id ? 'active' : ''}" data-model="${model.model_id}">
      <div class="name">${model.model_name}</div>
      <div class="sub">${model.category} · ${model.year}년형</div>
      <div class="price">${getMinPrice(model).toLocaleString()}만원~</div>
    </button>`).join('');
}

function renderVariants() {
  if (!$('variants')) return;  // Vue가 처리
  const sec = $('sec-variant');
  if (!state.model) {
    sec?.classList.add('hidden');
    $('variants').innerHTML = '';
    return;
  }
  sec.classList.remove('hidden');
  $('variants').innerHTML = getModel().variants.map(v => {
    const minPrice = Math.min(...v.trims.map(t => getTrimPrice(t, state.tax_rate)));
    return `<button class="card ${state.variant === v.variant_id ? 'active' : ''}" data-variant="${v.variant_id}">
      <div class="name">${v.variant_name}</div>
      <div class="sub">${v.fuel} · ${v.displacement_cc}cc · ${v.transmission}</div>
      <div class="price">${minPrice.toLocaleString()}만원~</div>
    </button>`;
  }).join('');
}

function renderTrims() {
  if (!$('trims')) return;  // Vue가 처리
  const sec = $('sec-trim');
  const detailEl = $('trim-detail');
  if (!state.variant) {
    sec?.classList.add('hidden');
    $('trims').innerHTML = '';
    if (detailEl) detailEl.innerHTML = '';
    return;
  }
  sec.classList.remove('hidden');
  $('trims').innerHTML = getVariant().trims.map(t => `
    <div class="trim-row ${state.trim === t.trim_id ? 'active' : ''}" data-trim="${t.trim_id}">
      <div class="info">
        <div class="name">${t.name}</div>
        <div class="meta">${t.seats}인승 · ${t.engine}</div>
      </div>
      <div class="price">${getTrimPrice(t, state.tax_rate).toLocaleString()}만원</div>
    </div>`).join('');
  if (state.trim) {
    const trim = getTrim();
    const fe = trim.fuel_economy || {};
    detailEl.innerHTML = `
      <div class="specs">

        <div class="spec-item"><div class="k">도심/고속</div><div class="v">${fe.urban ?? '—'} / ${fe.highway ?? '—'}</div></div>
        <div class="spec-item"><div class="k">CO₂</div><div class="v">${fe.co2 ?? '—'} g/km</div></div>
      </div>

        <span class="label">표준 사양</span>
        ${trim.standard_features.join(' · ')}
      </div>`;
  } else detailEl.innerHTML = '';
}

function renderOptions() {
  const sec = $('sec-options');
  if (!state.trim) {
    sec.classList.add('hidden');
    return;  // Vue OptionsList가 자동으로 빈 상태 처리
  }
  sec.classList.remove('hidden');
  return;  // 이하 옛 DOM 코드는 Vue가 대체 — 미실행
  const om = getOptionsMaster();
  const trim = getTrim();
  const v = getVariant();
  const optIds = trim.available_options || [];
  if (optIds.length === 0) {
    $('options').innerHTML = '<div class="empty-state">이 트림은 선택 가능한 옵션이 없습니다</div>';
    return;
  }
  $('options').innerHTML = optIds.map(id => {
    const opt = om[id];
    if (!opt) return '';
    const checked = state.options.has(id);
    const enabled = isOptionEnabled(id);
    let hint = '';
    if (opt.requires) hint = `<div class="o-sub" style="color:#c00;"><i class="ph ph-warning"></i> 선행 필수: ${opt.requires.map(r => om[r].name).join(', ')}</div>`;
    else if (opt.requires_in_trim?.[state.trim]) hint = `<div class="o-sub" style="color:#c00;"><i class="ph ph-warning"></i> 선행 필수: ${opt.requires_in_trim[state.trim].map(r => om[r].name).join(', ')}</div>`;
    
    // 같은 그룹에서 하나만 고를 수 있다는 안내
    const group = getExclusiveGroup(id);
    if (group) {
      hint += `<div class="o-sub" style="color:var(--ink-4);font-size:11px;"><i class="ph ph-info"></i> ${group.label} 중 하나만 선택 가능</div>`;
    }
    
    // 비활성화 사유 (포함 관계로 막힌 경우만 표시)
    if (!enabled && !checked) {
      const parent = getExcludingParent(id);
      if (parent) {
        hint += `<div class="o-sub" style="color:#888;">🔒 [${om[parent].name}]에 이미 포함됨</div>`;
      }
    }
    
    // 이 옵션이 포함하는 다른 옵션 표시 (참고용)
    if (v?.option_excludes?.[id] && v.option_excludes[id].length > 0) {
      const incNames = v.option_excludes[id].map(eid => om[eid]?.name || eid).join(', ');
      hint += `<div class="o-sub" style="color:#888;font-size:11px;">📦 포함: ${incNames}</div>`;
    }
    
    return `<label class="option-row ${checked ? 'active' : ''} ${!enabled ? 'disabled' : ''}" data-opt="${id}">
      <input type="checkbox" ${checked ? 'checked' : ''} ${!enabled ? 'disabled' : ''}>
      <div class="o-info">
        <div class="o-name">${opt.name}</div>
        ${opt.sub ? `<div class="o-sub">${opt.sub}</div>` : ''}
        ${hint}
      </div>
      <div class="o-price">+${getOptionPrice(opt, state.trim)}만</div>
    </label>`;
  }).join('');
}

function renderColors() {
  if (!$('colors')) return;  // Vue ColorSection이 처리
  const sec = $('sec-color');
  if (!state.trim) {
    sec?.classList.add('hidden');
    $('colors').innerHTML = '';
    return;
  }
  sec.classList.remove('hidden');
  $('colors').innerHTML = getModel().exterior_colors.map((c, i) => `
    <div class="color-card ${state.color === i ? 'active' : ''}" data-color="${i}">
      <div class="color-swatch" style="background:${c.hex};"></div>
      <div class="c-name">${c.name}</div>
      <div class="c-price">${c.price > 0 ? `+${c.price}만` : ''}</div>
    </div>`).join('');
}

function renderTotal() {
  let total = 0; let trimPrice = 0; let optionsPrice = 0; let colorPrice = 0;
  let summary = '차량 미선택';
  if (state.trim) {
    const m = getManufacturer();
    const model = getModel();
    const trim = getTrim();
    const om = getOptionsMaster();
    trimPrice = getTrimPrice(trim, state.tax_rate);
    summary = `${m.manufacturer_name} ${model.model_name} ${trim.name}`;
    state.options.forEach(id => {
      if (om[id]) optionsPrice += getOptionPrice(om[id], state.trim);
    });
    if (state.options.size > 0) summary += ` + 옵션${state.options.size}`;
    if (state.color !== null) colorPrice = model.exterior_colors[state.color].price;
    total = trimPrice + optionsPrice + colorPrice;
  }
  $('selected-summary').textContent = summary;
  $('total').textContent = state.trim ? `${total.toLocaleString()} 만원` : '— 만원';
  // wel 4기간 계산 hook
  if (window.__welrix_onPriceChange) {
    const m = getManufacturer();
    const model = getModel();
    const variant = getVariant();
    const trim = getTrim();
    const om = getOptionsMaster();
    window.__welrix_onPriceChange({
      brand: m?.manufacturer_name,
      model: model?.model_name,
      variant: variant?.variant_name,
      trim_name: trim?.name,
      fuel: variant?.fuel,
      displacement_cc: variant?.displacement_cc,
      engine: trim?.engine,
      total_manwon: total,
      trim_price_manwon: trimPrice,
      options_price_manwon: optionsPrice,
      color_price_manwon: colorPrice,
      tax_rate: state.tax_rate,
      options: Array.from(state.options).map(id => om?.[id]?.name).filter(Boolean),
      colorExt: (state.color !== null && model?.exterior_colors) ? model.exterior_colors[state.color]?.name : null,
    });
  }
}

function render() {
  renderBreadcrumb();
  renderManufacturers();
  renderModels();
  renderVariants();
  renderTrims();
  renderOptions();
  renderColors();
  renderTotal();
  syncDropdowns();  // 웹용 dropdown 동기화 (모바일은 무영향)
  setCurrentStep();
  syncToVueStore();  // Vue 컴포넌트가 reactive 읽도록 state 미러링

// Vue 마이그레이션 후 main.js가 mount 끝나면 한 번 더 호출해서 store 초기화
window.__welrix_render = render;

// Vue store에 cascade state 동기화 (Vue 컴포넌트가 vehicleState 읽음)
const BRAND_LOGOS_MAP = {
  hyundai: 'https://cdn.simpleicons.org/hyundai/002C5F',
  kia: 'https://cdn.simpleicons.org/kia/05141F',
  genesis: '/genesis.png',
};

function syncToVueStore() {
  const vs = window.__welrix_store?.vehicleState;
  if (!vs) return;
  vs.manufacturer = state.manufacturer;
  vs.model = state.model;
  vs.variant = state.variant;
  vs.trim = state.trim;
  vs.color = state.color;
  vs.tax_rate = state.tax_rate;
  vs.options.clear();
  state.options.forEach((id) => vs.options.add(id));
  // === Cascade dropdown options ===
  const sortedMfrs = sortByRank(VEHICLE_DB.manufacturers, (m) => m.manufacturer_name, POPULAR_BRAND);
  vs.manufacturerOptions = sortedMfrs.map((m) => ({
    value: m.manufacturer_id,
    label: m.manufacturer_name,
    iconUrl: BRAND_LOGOS_MAP[m.manufacturer_id] || null,
  }));
  const manu = getManufacturer();
  // operating: false (엑셀 부재 트림) 은 cascade 에서 숨김.
  // 트림이 모두 비활성화된 variant/model 은 같이 숨김.
  const isOperating = (t) => t.operating !== false;
  const variantHasActive = (v) => (v.trims || []).some(isOperating);
  const modelHasActive = (m) => (m.variants || []).some(variantHasActive);
  if (manu) {
    const activeModels = manu.models.filter(modelHasActive);
    const sortedModels = sortByRank(activeModels, (m) => m.model_name, POPULAR_MODELS[manu.manufacturer_name] || []);
    vs.modelOptions = sortedModels.map((m) => ({ value: m.model_id, label: m.model_name }));
  } else {
    vs.modelOptions = [];
  }
  const model = getModel();
  if (model) {
    const activeVariants = model.variants.filter(variantHasActive);
    const sortedVariants = sortByRank(activeVariants, (v) => v.fuel, POPULAR_FUELS);
    vs.variantOptions = sortedVariants.map((v) => ({ value: v.variant_id, label: v.variant_name }));
  } else {
    vs.variantOptions = [];
  }
  const variant = getVariant();
  if (variant) {
    const activeTrims = variant.trims.filter(isOperating);
    // 트림은 가격 오름차순 (싼 것부터) — 영업이 손님 예산 보고 위에서 아래로 확인
    const sortedTrims = [...activeTrims].sort((a, b) =>
      getTrimPrice(a, state.tax_rate) - getTrimPrice(b, state.tax_rate)
    );
    vs.trimOptions = sortedTrims.map((t) => {
      const price = getTrimPrice(t, state.tax_rate);
      return { value: t.trim_id, label: `${t.name} · ${price.toLocaleString()}만` };
    });
  } else {
    vs.trimOptions = [];
  }
  // 외장 색상
  if (model && state.trim) {
    vs.exteriorColorOptions = (model.exterior_colors || []).map((c, i) => ({
      value: String(i),
      label: `${c.name}${c.price > 0 ? ' · +' + c.price + '만' : ''}`,
      name: c.name,
      swatch: c.hex,
    }));
  } else {
    vs.exteriorColorOptions = [];
  }
  // 옵션 메타 (기존)
  if (state.trim) {
    const om = getOptionsMaster();
    const trim = getTrim();
    vs.optionsForCurrentTrim = (trim.available_options || []).map((id) => {
      const opt = om[id];
      if (!opt) return null;
      const group = getExclusiveGroup(id);
      const excludingParent = (!isOptionEnabled(id) && !state.options.has(id)) ? getExcludingParent(id) : null;
      return {
        id, name: opt.name, sub: opt.sub || '',
        price: getOptionPrice(opt, state.trim),
        enabled: isOptionEnabled(id),
        requiresLabels: (opt.requires || opt.requires_in_trim?.[state.trim] || []).map((r) => om[r]?.name).filter(Boolean),
        exclusiveGroupLabel: group?.label || null,
        excludingParentName: excludingParent ? om[excludingParent]?.name : null,
        includesNames: (opt.includes || []).map((id) => om[id]?.name).filter(Boolean),
      };
    }).filter(Boolean);
  } else {
    vs.optionsForCurrentTrim = [];
  }
}

// Vue → cascade 선택 위임
window.__welrix_pick = function(stepKey, value) {
  if (stepKey === 'manufacturer') {
    state.manufacturer = value || null;
    state.model = state.variant = state.trim = state.color = null;
    state.options.clear();
    if (state.manufacturer) $('sec-model').classList.remove('hidden');
  } else if (stepKey === 'model') {
    state.model = value || null;
    state.variant = state.trim = state.color = null;
    state.options.clear();
    if (state.model) $('sec-variant').classList.remove('hidden');
  } else if (stepKey === 'variant') {
    state.variant = value || null;
    state.trim = state.color = null;
    state.options.clear();
    if (state.variant) $('sec-trim').classList.remove('hidden');
  } else if (stepKey === 'trim') {
    state.trim = value || null;
    state.color = null;
    state.options.clear();
    if (state.trim) {
      $('sec-options').classList.remove('hidden');
      $('sec-color').classList.remove('hidden');
    }
  } else if (stepKey === 'colorExt') {
    state.color = value !== '' && value != null ? +value : null;
  }
  render();
};

// Vue 컴포넌트에서 옵션 토글 — 인라인 로직 그대로 호출
window.__welrix_toggleOption = function(id) {
  if (state.options.has(id)) state.options.delete(id);
  else state.options.add(id);
  // 배타 그룹 — 같은 그룹의 다른 옵션 자동 해제
  const group = getExclusiveGroup(id);
  if (group && state.options.has(id)) {
    group.members.forEach((m) => { if (m !== id) state.options.delete(m); });
  }
  render();
};

// cascade 진행 중 "다음에 선택해야 할" 섹션 강조
function setCurrentStep() {
  const cascade = ['sec-manufacturer', 'sec-model', 'sec-variant', 'sec-trim'];
  cascade.forEach((id) => document.getElementById(id)?.classList.remove('is-current'));
  let currentId = null;
  if (!state.manufacturer) currentId = 'sec-manufacturer';
  else if (!state.model)   currentId = 'sec-model';
  else if (!state.variant) currentId = 'sec-variant';
  else if (!state.trim)    currentId = 'sec-trim';
  if (currentId) document.getElementById(currentId)?.classList.add('is-current');
}

// 판매량 순 정렬 (현대/기아/제네시스 — 2024~2025 국내 판매 기준)
const POPULAR_BRAND  = ['현대', '기아', '제네시스'];
const POPULAR_MODELS = {
  '현대':    ['그랜저', '캐스퍼', '싼타페', '팰리세이드', '투싼', '쏘나타', '아반떼', '코나', '베뉴', '포터'],
  '기아':    ['쏘렌토', '카니발', '스포티지', 'K5', 'K8', '셀토스', '니로', '모닝', '레이', 'K9'],
  '제네시스': ['GV80', 'G80', 'GV70', 'G90', 'G70'],
};
// 엔진/연료 인기순 — 가솔린 > 하이브리드 > LPG > 디젤
const POPULAR_FUELS = ['가솔린', '하이브리드', 'HEV', 'LPG', 'LPi', '디젤'];
// 트림 인기순 — 영업/장애인용/단순기본 트림은 뒤로
const POPULAR_TRIMS = ['노블레스', '시그니처', '캘리그래피', '프레스티지', '익스클루시브', '아너스', '베스트', '인스퍼레이션', '프리미엄', '모던', '스마트', '트렌디', '플래티넘', '플래그십'];
const LOW_PRIORITY_TRIM = /영업|장애|렌터|운전교습|기본/;

function rankBy(list, str) {
  for (let i = 0; i < list.length; i++) {
    if (str?.includes(list[i])) return i;
  }
  return 999;
}

function sortByRank(items, getStr, list, lowPriorityRe = null) {
  return items.slice().sort((a, b) => {
    const sa = getStr(a), sb = getStr(b);
    if (lowPriorityRe) {
      const la = lowPriorityRe.test(sa), lb = lowPriorityRe.test(sb);
      if (la !== lb) return la ? 1 : -1;
    }
    return rankBy(list, sa) - rankBy(list, sb);
  });
}

// 브랜드 로고 URL 매핑 (SimpleIcons CDN)
const BRAND_LOGOS = {
  hyundai: 'https://cdn.simpleicons.org/hyundai/002C5F',
  kia: 'https://cdn.simpleicons.org/kia/05141F',
  genesis: 'https://cdn.simpleicons.org/genesismotor/1C1C1C',
};

function syncDropdowns() {
  // 제조사 dropdown
  const ddM = $('dd-manufacturer');
  if (ddM) {
    const manus = sortByRank(VEHICLE_DB.manufacturers, (m) => m.manufacturer_name, POPULAR_BRAND);
    ddM.innerHTML = '<option value="">제조사 선택</option>' +
      manus.map((m) =>
        `<option value="${m.manufacturer_id}" ${m.manufacturer_id === state.manufacturer ? 'selected' : ''}>${m.manufacturer_name}</option>`
      ).join('');
  }
  // 선택된 브랜드 로고 swatch
  const sw = $('brand-swatch');
  if (sw) {
    const url = BRAND_LOGOS[state.manufacturer];
    sw.style.backgroundImage = url ? `url('${url}')` : 'none';
  }
  // 모델 — 판매량 순
  const ddMo = $('dd-model');
  const manu = getManufacturer();
  if (ddMo) {
    ddMo.disabled = !manu;
    const models = manu ? sortByRank(manu.models || [], (m) => m.model_name, POPULAR_MODELS[manu.manufacturer_name] || []) : [];
    ddMo.innerHTML = '<option value="">모델 선택</option>' +
      models.map((m) =>
        `<option value="${m.model_id}" ${m.model_id === state.model ? 'selected' : ''}>${m.model_name}</option>`
      ).join('');
  }
  // 세부모델 (variant) — 가솔린 > 하이브리드 > LPG > 디젤
  const ddV = $('dd-variant');
  const model = getModel();
  if (ddV) {
    ddV.disabled = !model;
    const variants = model ? sortByRank(model.variants || [], (v) => v.variant_name, POPULAR_FUELS) : [];
    ddV.innerHTML = '<option value="">세부모델 선택</option>' +
      variants.map((v) =>
        `<option value="${v.variant_id}" ${v.variant_id === state.variant ? 'selected' : ''}>${v.variant_name}</option>`
      ).join('');
  }
  // 트림 — 가격 낮은 순
  const ddT = $('dd-trim');
  const variant = getVariant();
  if (ddT) {
    ddT.disabled = !variant;
    const trims = variant
      ? (variant.trims || []).slice().sort((a, b) => getTrimPrice(a, state.tax_rate) - getTrimPrice(b, state.tax_rate))
      : [];
    ddT.innerHTML = '<option value="">트림 선택</option>' +
      trims.map((t) => {
        const price = getTrimPrice(t, state.tax_rate);
        return `<option value="${t.trim_id}" ${t.trim_id === state.trim ? 'selected' : ''}>${t.name} · ${price.toLocaleString()}만</option>`;
      }).join('');
  }
  // 외장 색상 — 트림까지 확정돼야 활성
  const ddCe = $('dd-color-ext');
  if (ddCe) {
    ddCe.disabled = !state.trim;
    ddCe.innerHTML = '<option value="">외장 색상</option>' +
      (state.trim && model ? (model.exterior_colors || []) : []).map((c, i) =>
        `<option value="${i}" ${i === state.color ? 'selected' : ''}>${c.name}${c.price > 0 ? ' · +' + c.price.toLocaleString() + '만' : ''}</option>`
      ).join('');
  }
  // 내장 색상 — 트림까지 확정돼야 활성 (quote.js 가 옵션 채움, 여기서는 disabled 만)
  const ddCi = $('dd-color-int');
  if (ddCi) {
    ddCi.disabled = !state.trim;
  }
}

// dropdown change handlers (한 번만 등록)
function attachDropdownHandlers() {
  $('dd-manufacturer')?.addEventListener('change', (e) => {
    state.manufacturer = e.target.value || null;
    state.model = state.variant = state.trim = state.color = null;
    state.options.clear();
    if (state.manufacturer) $('sec-model').classList.remove('hidden');
    render();
    if (state.manufacturer) requestAnimationFrame(() => $('dd-model')?.focus());
  });
  $('dd-model')?.addEventListener('change', (e) => {
    state.model = e.target.value || null;
    state.variant = state.trim = state.color = null;
    state.options.clear();
    if (state.model) $('sec-variant').classList.remove('hidden');
    render();
    if (state.model) requestAnimationFrame(() => $('dd-variant')?.focus());
  });
  $('dd-variant')?.addEventListener('change', (e) => {
    state.variant = e.target.value || null;
    state.trim = state.color = null;
    state.options.clear();
    if (state.variant) $('sec-trim').classList.remove('hidden');
    render();
    if (state.variant) requestAnimationFrame(() => $('dd-trim')?.focus());
  });
  $('dd-trim')?.addEventListener('change', (e) => {
    state.trim = e.target.value || null;
    state.color = null;
    state.options.clear();
    if (state.trim) {
      $('sec-options').classList.remove('hidden');
      $('sec-color').classList.remove('hidden');
    }
    render();
    // 트림까지 선택되면 옵션 섹션으로 부드럽게 스크롤
    if (state.trim) {
      requestAnimationFrame(() => {
        $('sec-options')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }
  });
  $('dd-color-ext')?.addEventListener('change', (e) => {
    state.color = e.target.value !== '' ? +e.target.value : null;
    render();
    // swatch 직접 갱신 (quote.js hook이 못 잡는 케이스 대비)
    const sel = e.target;
    const text = sel.options[sel.selectedIndex]?.text || '';
    const name = text.split('·')[0].trim();
    window.__welrix_updateExtSwatch?.(name);
  });
}
attachDropdownHandlers();

const _CDD_INSTANCES = [];
class CustomDropdown {
  constructor(selectEl, getMeta) {
    this.select = selectEl;
    this.getMeta = getMeta;
    this._build();
    this._bind();
    this.refresh();
  }
  _build() {
    this.wrap = document.createElement('div');
    this.wrap.className = 'cdd';
    this.wrap.innerHTML = `
      <button type="button" class="cdd__btn">
        <span class="cdd__current">
          <span class="cdd__icon cdd__icon--empty"></span>
          <span class="cdd__text cdd__text--placeholder"></span>
        </span>
        <span class="cdd__chev"></span>
      </button>
      <div class="cdd__menu" hidden></div>
    `;
    this.btn = this.wrap.querySelector('.cdd__btn');
    this.menu = this.wrap.querySelector('.cdd__menu');
    this.icon = this.wrap.querySelector('.cdd__current .cdd__icon');
    this.text = this.wrap.querySelector('.cdd__current .cdd__text');
    this.select.parentNode.insertBefore(this.wrap, this.select);
    this.select.style.display = 'none';
  }
  _bind() {
    this.btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (this.select.disabled) return;
      this.toggle();
    });
    this.menu.addEventListener('click', (e) => {
      const opt = e.target.closest('.cdd__opt');
      if (!opt) return;
      this.selectValue(opt.dataset.value);
    });
    document.addEventListener('click', (e) => {
      if (!this.wrap.contains(e.target)) this.close();
    });
    // 외부에서 select.value/options 변경시 button 동기화
    this.select.addEventListener('change', () => this.refresh());
  }
  _setIcon(meta) {
    this.icon.style.backgroundImage = meta.iconUrl ? `url('${meta.iconUrl}')` : '';
    this.icon.style.backgroundColor = meta.swatch || '';
    this.icon.style.background = meta.swatch && !meta.iconUrl ? meta.swatch : (meta.iconUrl ? `url('${meta.iconUrl}') center/contain no-repeat` : '');
    const hasVisual = !!(meta.iconUrl || meta.swatch);
    this.icon.classList.toggle('cdd__icon--empty', !hasVisual);
  }
  refresh() {
    const opt = this.select.options[this.select.selectedIndex];
    if (!opt) return;
    const meta = this.getMeta(opt) || {};
    this._setIcon(meta);
    this.text.textContent = meta.label || opt.textContent;
    this.text.classList.toggle('cdd__text--placeholder', !opt.value);
    this.wrap.classList.toggle('cdd--disabled', this.select.disabled);
  }
  _renderMenu() {
    const cur = this.select.value;
    this.menu.innerHTML = Array.from(this.select.options).map((opt) => {
      const meta = this.getMeta(opt) || {};
      let iconHtml;
      if (meta.iconUrl) iconHtml = `<span class="cdd__icon" style="background-image:url('${meta.iconUrl}')"></span>`;
      else if (meta.swatch) iconHtml = `<span class="cdd__icon" style="background:${meta.swatch}"></span>`;
      else iconHtml = '<span class="cdd__icon cdd__icon--empty"></span>';
      const sel = opt.value === cur ? 'cdd__opt--sel' : '';
      return `<button type="button" class="cdd__opt ${sel}" data-value="${opt.value}">${iconHtml}<span>${meta.label || opt.textContent}</span></button>`;
    }).join('');
  }
  open() { this._renderMenu(); this.menu.hidden = false; this.wrap.classList.add('cdd--open'); }
  close() { this.menu.hidden = true; this.wrap.classList.remove('cdd--open'); }
  toggle() { if (this.menu.hidden) this.open(); else this.close(); }
  selectValue(value) {
    this.select.value = value;
    this.select.dispatchEvent(new Event('change'));
    this.refresh();
    this.close();
  }
}

const _BRAND_LOGOS_CDD = {
  hyundai: 'https://cdn.simpleicons.org/hyundai/002C5F',
  kia: 'https://cdn.simpleicons.org/kia/05141F',
  genesis: '/genesis.png',
};

function _initCustomDropdowns() {
  // 제조사
  const mfr = $('dd-manufacturer');
  if (mfr) _CDD_INSTANCES.push(new CustomDropdown(mfr, (opt) => ({
    iconUrl: _BRAND_LOGOS_CDD[opt.value] || null,
    label: opt.textContent,
  })));
  // 외장 색상 — option.text 에서 색상명 추출, guessColor 로 hex 추정 (quote.js)
  const colorEx = $('dd-color-ext');
  if (colorEx) _CDD_INSTANCES.push(new CustomDropdown(colorEx, (opt) => {
    const name = (opt.textContent || '').split('·')[0].trim();
    const hex = (window.__welrix_guessColor ? window.__welrix_guessColor(name) : '#e5e5e5');
    return { swatch: opt.value === '' ? null : hex, label: opt.textContent };
  }));
  // 내장 색상 — label 형식: "블랙 (기본)" / "투톤 (+500,000원)" → 첫 단어가 색명
  const colorIn = $('dd-color-int');
  if (colorIn) _CDD_INSTANCES.push(new CustomDropdown(colorIn, (opt) => {
    const name = (opt.textContent || '').split(/[\s(]/)[0].trim();
    const hex = (window.__welrix_guessColor ? window.__welrix_guessColor(name) : '#e5e5e5');
    const noSwatch = !opt.value || opt.value.startsWith('|');
    return { swatch: noSwatch ? null : hex, label: opt.textContent };
  }));
}
_initCustomDropdowns();

// syncDropdowns 호출 후 CustomDropdown 동기화 (option 변경 시 button + 메뉴 갱신)
const _origSyncDropdowns = syncDropdowns;
syncDropdowns = function() {
  _origSyncDropdowns.apply(this, arguments);
  _CDD_INSTANCES.forEach((cdd) => cdd.refresh());
};

// 페이지 로드 시 스키마 검증 (개발자용, 콘솔 확인)
(function runValidation() {
  const errors = validateVehicleDB(VEHICLE_DB);
  if (errors.length === 0) {
    console.log('%c[OK] VEHICLE_DB 스키마 검증 통과', 'color: green; font-weight: bold');
    const stats = {
      manufacturers: VEHICLE_DB.manufacturers.length,
      models: VEHICLE_DB.manufacturers.reduce((a, m) => a + m.models.length, 0),
      variants: VEHICLE_DB.manufacturers.reduce((a, m) => a + m.models.reduce((b, mo) => b + mo.variants.length, 0), 0),
      trims: VEHICLE_DB.manufacturers.reduce((a, m) => a + m.models.reduce((b, mo) => b + mo.variants.reduce((c, v) => c + v.trims.length, 0), 0), 0)
    };
    console.log('%c[stats]', 'color: blue', stats);
  } else {
    console.error('%c[FAIL] VEHICLE_DB 스키마 검증 실패: ' + errors.length + '건', 'color: red; font-weight: bold');
    errors.forEach(e => console.error('  • ' + e));
  }
})();
