  .qc-pct:focus-within { border-bottom-color: var(--ink-1); }
  .qc-pct input {
    flex: 1; min-width: 0;
    height: 28px; padding: 0 0 0 2px;
    border: none; background: transparent;
    font-size: 13px; color: var(--ink-1); font-family: inherit;
    font-variant-numeric: tabular-nums; text-align: right;
    outline: none;
    -moz-appearance: textfield;
  }
  .qc-pct input::-webkit-outer-spin-button,
  .qc-pct input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .qc-pct em {
    font-style: normal; color: var(--ink-4); font-size: 11px; padding-right: 2px;
  }
  .qc-field > select, .qc-field > input {
    height: 28px; padding: 0 0 0 2px;
    border: none; border-bottom: 1px solid var(--line-2); border-radius: 0;
    background: transparent; font-size: 13px; font-family: inherit; color: var(--ink-1);
    font-variant-numeric: tabular-nums;
    outline: none;
    transition: border-color .12s;
  }
  .qc-field > select { appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%23a3a3a3' stroke-width='1.5' stroke-linecap='round'><polyline points='3 5 6 8 9 5'/></svg>");
    background-repeat: no-repeat; background-position: right 4px center; background-size: 11px 11px;
    padding-right: 20px; cursor: pointer;
  }
  .qc-field > select:hover, .qc-field > input:hover { border-bottom-color: var(--ink-3); }
  .qc-field > select:focus, .qc-field > input:focus { border-bottom-color: var(--ink-1); }
  .qc-field .pct {
    display: flex; align-items: center; gap: 4px;
    height: 28px; border: none; border-bottom: 1px solid var(--line-2); border-radius: 0; padding: 0;
    background: transparent; font-size: 12px; color: var(--ink-4);
    transition: border-color .12s;
  }
  .qc-field .pct:focus-within { border-bottom-color: var(--ink-1); }
  .qc-field .pct input {
    border: none; height: 100%; padding: 0; flex: 1; min-width: 0;
    font-size: 13px; text-align: right;
  }
  .qc-field .pct input:hover { border-bottom: none; }
  .qc-field .pct input:focus { outline: none; border-bottom: none; }

  /* 4기간 */
  .qp-terms__title {
    font-size: 12px; font-weight: 500; color: var(--ink-3);
    letter-spacing: 0; padding: 14px 0 8px; margin: 0;
  }
  .terms-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; margin-bottom: 14px;
  }
  @media (max-width: 480px) {
    .terms-grid { grid-template-columns: 1fr; }
  }
  .term-card {
    background: transparent; border: none; border-radius: 0;
    border-top: 1px solid var(--line-2);
    padding: 14px 12px 4px; position: relative; transition: background .15s;
  }
  .term-card:hover { background: var(--bg-soft); }
  .term-card.recommended {
    border-top-color: var(--ink-1); border-top-width: 1.5px;
    background: transparent;
  }
  .term-card.unchecked { opacity: 0.35; }
  .term-card__head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .term-card__term-dd {
    appearance: none; -webkit-appearance: none;
    background: transparent; border: none;
    font-size: 11px; font-weight: 500; color: var(--ink-1);
    letter-spacing: 0.4px; cursor: pointer;
    padding: 2px 14px 2px 0;
    font-family: inherit;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%23737373' stroke-width='1.5' stroke-linecap='round'><polyline points='3 5 6 8 9 5'/></svg>");
    background-repeat: no-repeat; background-position: right 0 center; background-size: 10px 10px;
    outline: none;
  }
  .term-card__term-dd:hover { color: var(--ink-1); }
  .term-card__cond {
    display: flex; gap: 10px; margin: 0 0 8px;
    padding-bottom: 8px; border-bottom: 1px solid var(--line);
  }
  .term-card__cond label {
    flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0;
  }
  .term-card__cond label > span:first-child {
    font-size: 10px; color: var(--ink-4); letter-spacing: 0.2px;
  }
  .term-card__cond .pct-cell {
    display: flex; align-items: center; gap: 2px;
    border-bottom: 1px solid var(--line-2); padding: 0;
    font-size: 11px; color: var(--ink-4);
    transition: border-color .12s;
  }
  .term-card__cond .pct-cell:focus-within { border-bottom-color: var(--ink-1); }
  .term-card__cond .pct-cell input {
    flex: 1; min-width: 0; height: 22px;
    border: none; background: transparent; padding: 0;
    font-size: 12px; color: var(--ink-1); font-variant-numeric: tabular-nums;
    text-align: right; font-family: inherit;
    outline: none;
    -moz-appearance: textfield;
  }
  .term-card__cond .pct-cell input::-webkit-outer-spin-button,
  .term-card__cond .pct-cell input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .term-card__check { display: inline-flex; align-items: center; }
  .term-card__check input {
    width: 14px; height: 14px;
    margin: 0; cursor: pointer; accent-color: var(--brand);
    flex-shrink: 0;
  }
  .term-card__monthly {
    font-size: 22px; font-weight: 500; color: var(--ink-1);
    letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
  }
  .term-card__monthly em {
    font-style: normal; font-size: 12px; font-weight: 400; color: var(--ink-4); margin-left: 2px;
  }
  .term-card__divider { display: none; }
  .term-card__row {
    display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0;
  }
  .term-card__row span { color: var(--ink-4); display: inline-flex; align-items: baseline; gap: 4px; }
  .term-card__row b { color: var(--ink-2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .term-card__row .resid-pct {
    font-style: normal; font-size: 10px; font-weight: 500;
    color: var(--brand); font-variant-numeric: tabular-nums;
  }
  /* 빈 상태 — 차량 미선택 시 4기간 카드 골격만 노출 */
  .term-card--empty { opacity: 0.5; }
  .term-card--empty .term-card__monthly { color: var(--ink-4); font-weight: 400; }
  .term-card__cond .pct-cell--static {
    display: inline-block; border-bottom: none; padding: 0;
    font-size: 11px; color: var(--ink-4); height: auto;
  }
  /* 차량 선택되면 4기간 카드 페이드인 (empty→filled 전환 신호) */
  .term-card:not(.term-card--empty) {
    animation: termCardIn 0.28s ease-out both;
  }
  @keyframes termCardIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .term-card:not(.term-card--empty) { animation: none; }
  }

  /* 손님 견적서 (진짜 견적서 디자인) */
  .customer-output {
    border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff;
  }
  .customer-output__head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: #fafafa; border-bottom: 1px solid #eee;
    font-size: 11px; color: #999; font-weight: 600; letter-spacing: 1px;
  }
  .customer-output__head b { color: var(--brand); }
  .customer-output__head .actions { margin-left: auto; display: flex; gap: 6px; }
  /* 견적 복사 버튼 — 박스 없이 통일 */
  .customer-output__head button {
    height: 28px; padding: 0 8px;
    background: transparent; color: var(--brand);
    border: 0; border-radius: 4px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px;
    transition: background .12s, color .12s;
  }
  .customer-output__head button:hover { background: var(--brand-50); color: var(--brand); }
  .customer-output__head button.outline {
    color: var(--ink-2); font-weight: 400;
  }
  .customer-output__head button.outline:hover { background: var(--accent-soft); color: var(--ink-1); }

  /* 실제 견적서 영역 */
  /* === 견적서 v2 — 모바일 세로형 (540px), 모던 미니멀 ===
     html2canvas scale:2 로 1080px 추출 → 카톡 이미지용 */
  .quote-doc {
    width: 540px;
    margin: 0 auto;
    padding: 0;
    background: #fff;
    color: #1a1a1a;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: -0.2px;
  }

  /* --- 헤더 --- */
  .qd-hero {
    padding: 32px 28px 24px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
  }
  .qd-hero__brand {
    font-size: 12px; font-weight: 600;
    color: var(--brand); letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .qd-hero__logo {
    height: 28px; width: auto;
    margin-bottom: 8px;
    display: block;
  }
  .qd-hero__title {
    font-size: 22px; font-weight: 700;
    color: #1a1a1a; letter-spacing: -0.5px;
    line-height: 1.3;
  }
  .qd-hero__meta {
    margin-top: 14px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: #999;
    font-variant-numeric: tabular-nums;
  }
  .qd-hero__meta b { color: #555; font-weight: 500; }

  /* --- 섹션 공통 --- */
  .qd-section {
    padding: 22px 28px;
    border-bottom: 1px solid #f5f5f5;
  }
  .qd-section:last-child { border-bottom: 0; }
  .qd-section__label {
    font-size: 10px; font-weight: 600;
    color: #b0b0b0; letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* --- 손님 / 담당자 --- */
  .qd-people {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .qd-people__col h4 {
    font-size: 10px; font-weight: 600;
    color: #b0b0b0; letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .qd-people__col .name {
    font-size: 16px; font-weight: 600; color: #1a1a1a;
    margin-bottom: 2px;
  }
  .qd-people__col .tel {
    font-size: 12px; color: #888;
    font-variant-numeric: tabular-nums;
  }

  /* --- 차량 카드 --- */
  .qd-vehicle {
    background: var(--bg-soft); border-radius: var(--radius-md);
    padding: 18px 20px;
  }
  .qd-vehicle__top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; margin-bottom: 14px;
  }
  .qd-vehicle__title {
    font-size: 11px; color: #999; font-weight: 500;
    margin-bottom: 4px;
  }
  .qd-vehicle__name {
    font-size: 17px; font-weight: 700; color: #1a1a1a;
    letter-spacing: -0.3px; line-height: 1.3;
  }
  .qd-vehicle__sub {
    font-size: 11.5px; color: #777; margin-top: 3px;
  }
  .qd-vehicle__price {
    text-align: right; white-space: nowrap;
  }
  .qd-vehicle__price .label {
    font-size: 10px; color: #999; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 2px;
  }
  .qd-vehicle__price .value {
    font-size: 18px; font-weight: 700; color: #1a1a1a;
    font-variant-numeric: tabular-nums;
  }
  .qd-vehicle__rows {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  .qd-vehicle__row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .qd-vehicle__row .k { color: #999; }
  .qd-vehicle__row .v { color: #1a1a1a; font-weight: 500; }
  .qd-vehicle__row .v.color { display: inline-flex; align-items: center; gap: 5px; }
  .qd-vehicle__row .swatch {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .qd-vehicle__opts {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .qd-vehicle__opts .opt-chip {
    font-size: 10.5px; padding: 3px 7px;
    background: var(--bg); border: 1px solid var(--line-2); border-radius: var(--radius-sm);
    color: var(--ink-2);
  }
  .qd-vehicle__opts-label {
    width: 100%; font-size: 10px; color: #b0b0b0;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  /* 차량 카드 하단 부가 (선팅/탁송/용품) — 작게 */
  .qd-vehicle__side {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #eee;
    font-size: 10.5px; color: #888;
    line-height: 1.5;
  }
  .qd-vehicle__side span { display: inline; }

  /* --- 월 대여료 (강조) --- */
  .qd-monthly {
    display: flex; flex-direction: column; gap: 10px;
  }
  .qd-monthly__row {
    display: grid; grid-template-columns: 60px 1fr auto;
    align-items: center; gap: 16px;
    padding: 14px 18px;
    background: var(--bg-soft); border-radius: var(--radius-md);
    transition: background .15s;
  }
  .qd-monthly__row.best {
    background: var(--brand-50); border: 1px solid var(--brand);
  }
  .qd-monthly__term {
    font-size: 15px; font-weight: 700; color: #1a1a1a;
    font-variant-numeric: tabular-nums;
  }
  .qd-monthly__term em {
    font-style: normal; font-size: 11px; font-weight: 500; color: #999;
    display: block; margin-top: 1px;
  }
  .qd-monthly__cond {
    font-size: 11px; color: #777; line-height: 1.4;
  }
  .qd-monthly__cond b { color: #555; font-weight: 500; }
  .qd-monthly__price {
    text-align: right;
  }
  .qd-monthly__price .price {
    font-size: 19px; font-weight: 700; color: var(--brand);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .qd-monthly__price .unit { font-size: 12px; font-weight: 500; color: #999; }
  .qd-monthly__price .residual {
    font-size: 10.5px; color: #999; margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .qd-monthly__badge {
    position: absolute; top: -7px; right: 14px;
    background: var(--brand); color: #fff;
    font-size: 9.5px; font-weight: 600; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: var(--radius-sm);
  }
  .qd-monthly__row.best { position: relative; }

  /* --- 보험·정비 (압축 카드 2단) --- */
  .qd-info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .qd-info-card {
    background: var(--bg-soft); border-radius: var(--radius-md); padding: 14px 16px;
  }
  .qd-info-card h5 {
    font-size: 10px; font-weight: 600; color: #b0b0b0;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin: 0 0 8px;
  }
  .qd-info-card .kv {
    display: flex; justify-content: space-between;
    font-size: 11.5px; padding: 3px 0;
  }
  .qd-info-card .kv .k { color: #999; }
  .qd-info-card .kv .v { color: #1a1a1a; font-weight: 500; }

  /* --- 노트(주요 계약사항) / 제출서류 --- */
  .qd-notes {
    margin: 0; padding: 0; list-style: none;
  }
  .qd-notes li {
    font-size: 10.5px; color: #888; line-height: 1.6;
    padding-left: 12px; position: relative;
    margin-bottom: 3px;
  }
  .qd-notes li::before {
    content: ''; position: absolute; left: 0; top: 7px;
    width: 4px; height: 4px; border-radius: 50%;
    background: #ddd;
  }
  .qd-docs {
    display: flex; flex-direction: column; gap: 8px;
  }
  .qd-docs__item {
    font-size: 11px; color: #555; line-height: 1.5;
  }
  .qd-docs__item b {
    display: inline-block; color: var(--brand); font-weight: 600;
    margin-right: 6px; font-size: 10.5px;
  }

  /* --- 푸터 --- */
  .qd-footer {
    padding: 20px 28px 28px;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
  }
  .qd-footer__bank {
    font-size: 11px; color: var(--ink-2); margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }
  .qd-footer__bank .label {
    color: #999; margin-right: 4px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .qd-footer__bank b { color: #1a1a1a; font-weight: 600; }
  .qd-footer__sign {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px; border-top: 1px solid #ececec;
    font-size: 11px;
  }
  .qd-footer__sign .staff { color: #555; }
  .qd-footer__sign .staff b { color: #1a1a1a; font-weight: 600; }
  .qd-footer__sign .tel {
    color: #888; font-variant-numeric: tabular-nums;
  }

  .quote-doc__empty {
    text-align: center; padding: 80px 20px;
    color: #bbb; font-size: 13px;
  }

  /* 다중 차종 카드 — 제외 버튼 */
  .qd-section--card { position: relative; }
  .qd-vehicle { position: relative; }
  .qd-vehicle__remove {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px;
    border: 0; border-radius: 50%;
    background: rgba(0,0,0,0.06); color: #888;
    cursor: pointer; font-size: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s;
    z-index: 1;
  }
  .qd-vehicle__remove:hover { background: var(--brand); color: #fff; }

  /* ============================================================
   * 정식 견적서 (웹 캡쳐용) — 엑셀 견적서_고객 시트와 동일 양식
   * 영업이 모달에서 보고, 이미지로 캡쳐해 손님에게 보냄.
   * ============================================================ */
  .quote-doc.official {
    /* A4 (210×297mm). flex column 으로 푸터를 하단에 붙임 — 빈 공간 자동 채움. */
    width: 210mm;
    min-height: 297mm;
    box-sizing: border-box;
    margin: 0 auto;
    padding: 8mm 12mm 8mm;
    background: #fff;
    color: #1a1a1a;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    font-size: 11px;
    line-height: 1.4;
    letter-spacing: -0.2px;
    display: flex;
    flex-direction: column;
  }
  .quote-doc.official .ofq-spacer { flex: 1 1 auto; min-height: 0; }
  .quote-doc.official .ofq-footer { margin-top: 0; }
  /* 출력 (print) — print-mode 클래스 시 #print-target 만 표시 */
  @media print {
    @page { size: A4; margin: 0; }
    html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }
    body.print-mode > *:not(#print-target) { display: none !important; }
    body.print-mode #print-target {
      display: block !important;
      position: static !important;
      width: 210mm !important; min-height: 297mm !important;
      margin: 0 !important; padding: 8mm 12mm !important;
      box-shadow: none !important;
    }
  }
  /* 헤더 — 더 짜부 */
  .ofq-hero {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 5px; margin-bottom: 7px;
    border-bottom: 1px solid var(--line-2);
  }
  .ofq-hero__logo {
    height: 18px; width: auto; display: block;
    margin-bottom: 2px;
  }
  .ofq-hero__left { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .ofq-hero__left .title {
    font-size: 16px; font-weight: 600; color: #1a1a1a;
    letter-spacing: -0.5px; line-height: 1.1;
  }
  .ofq-hero__badge {
    display: inline-block;
    font-size: 9.5px; font-weight: 600; color: var(--brand);
    border: 1px solid var(--brand);
    padding: 1px 6px; border-radius: 2px;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }
  .ofq-hero__right {
    text-align: right; font-size: 11px; color: #666;
    line-height: 1.7; font-variant-numeric: tabular-nums;
  }
  .ofq-hero__right b { color: #1a1a1a; font-weight: 600; }

  /* 섹션 공통 — 1페이지 짜부 */
  .ofq-section { margin-bottom: 6px; }
  .ofq-section__title {
    font-size: 10px; font-weight: 600;
    color: var(--ink-2); letter-spacing: 1.5px;
    margin-bottom: 3px; padding-bottom: 2px;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
  }
  .ofq-section__title > i.ph {
    font-size: 12px; color: var(--brand);
    line-height: 1;
  }
  .ofq-section__title .unit {
    font-size: 10px; color: #999; font-weight: 400;
    letter-spacing: 0; margin-left: auto;
  }

  /* 표 wrapper — 차량 카드와 동일한 직각 외곽 */
  .ofq-table-wrap {
    border: 1px solid var(--line-2);
    /* 견적서 톤 = 직각 */
    background: var(--bg);
    overflow: hidden;
  }

  /* 격자 테이블 — 내부 격자만 (외곽은 wrapper 또는 자체 보더가 담당) */
  .ofq-table {
    width: 100%;
    border-collapse: separate; border-spacing: 0;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .ofq-table th, .ofq-table td {
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
    padding: 4px 8px;
    vertical-align: middle;
    line-height: 1.3;
  }
  .ofq-table th:last-child, .ofq-table td:last-child { border-right: 0; }
  .ofq-table tr:last-child th, .ofq-table tr:last-child td { border-bottom: 0; }
  .ofq-table th {
    background: var(--bg-soft);
    color: var(--ink-3); font-weight: 500;
    text-align: center;
    white-space: nowrap;
    font-size: 10.5px;
  }
  .ofq-table td {
    background: var(--bg); color: var(--ink-1);
    text-align: left;
  }
  .ofq-table td.center { text-align: center; }
  .ofq-table td.right { text-align: right; }
  .ofq-table td.price { color: #1a1a1a; font-weight: 600; }
  .ofq-table td.price-brand { color: var(--brand); font-weight: 700; }
  .ofq-table td.muted { color: #999; }
  .ofq-table td.highlight { background: #fff7f7; }

  /* 2단 정보 (legacy — 견적 정보 + 고객 정보, 이제 미사용) */
  .ofq-row2 {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }

  /* 수신·담당 한 줄 정보 바 — 짜부 */
  .ofq-infobar {
    display: flex; align-items: baseline;
    gap: var(--space-4);
    padding: 6px 12px;
    margin-bottom: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--line-2);
    border-left: 3px solid var(--brand);
  }
  .ofq-infobar__item {
    display: flex; align-items: baseline; gap: 10px;
    flex: 1; min-width: 0;
  }
  .ofq-infobar__label {
    font-size: 10px; font-weight: 600;
    color: var(--brand); letter-spacing: 1.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .ofq-infobar__value {
    font-size: 13px; color: var(--ink-1);
    letter-spacing: -0.2px;
  }
  .ofq-infobar__value b { font-weight: 700; }
  .ofq-infobar__divider {
    width: 1px; height: 16px;
    background: var(--line-2);
    flex-shrink: 0;
  }

  /* === 차량 카드 (직각/정제 톤, 견적서 정통 양식) === */
  .ofq-vcard {
    border: 1px solid var(--line-2);
    padding: 10px 14px;
    background: var(--bg);
  }
  .ofq-vcard__head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
    padding-bottom: 8px; margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .ofq-vcard__title {
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 0;
  }
  .ofq-vcard__title .vlogo {
    height: 22px; width: auto; max-width: 56px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .ofq-vcard__title .vname {
    font-size: 14px; font-weight: 600;
    color: var(--ink-1); letter-spacing: -0.3px;
    line-height: 1.25;
  }
  .ofq-vcard__title .vmeta {
    margin-top: 2px;
    font-size: 10.5px; color: var(--ink-4);
    font-weight: 400; letter-spacing: 0;
  }
  /* 차량 정보 메타 grid — 외장/내장/탁송/선팅 4분할 */
  .ofq-meta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--line);
  }
  .ofq-meta-grid .meta-item {
    display: flex; flex-direction: column; justify-content: center;
    padding: 7px 12px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    min-width: 0;
    min-height: 40px;
  }
  .ofq-meta-grid .meta-item:nth-child(4n) { border-right: none; }
  .ofq-meta-grid .meta-item:nth-last-child(-n+4) { border-bottom: none; }
  .ofq-meta-grid .meta-key {
    font-size: 9.5px; color: var(--ink-4);
    letter-spacing: 0.5px;
    font-weight: 500; margin-bottom: 3px;
  }
  .ofq-meta-grid .meta-val {
    font-size: 12px; color: var(--ink-1);
    font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
  }
  .ofq-meta-grid .swatch-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.18);
    display: inline-block; flex-shrink: 0;
  }
  .ofq-meta-grid .meta-empty {
    color: var(--ink-4); font-weight: 400; font-style: normal;
  }
  .ofq-vcard__total {
    text-align: right; white-space: nowrap;
  }
  .ofq-vcard__total .label {
    font-size: 10px; color: #999;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .ofq-vcard__total .value {
    font-size: 22px; font-weight: 700;
    color: var(--brand);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .ofq-vcard__total .breakdown {
    margin-top: 4px;
    font-size: 11px; color: #999;
    font-variant-numeric: tabular-nums;
  }
  .ofq-vcard__total .breakdown b {
    color: #555; font-weight: 600;
  }
  .ofq-vcard__row {
    display: grid; grid-template-columns: 70px 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .ofq-vcard__row:last-child { border-bottom: 0; }
  .ofq-vcard__row .row-key {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: #999;
    font-weight: 500; letter-spacing: 0.3px;
  }
  .ofq-vcard__row .row-key i {
    font-size: 13px; color: #bbb;
  }
  .ofq-vcard__row--side {
    font-size: 11.5px; color: #777;
  }
  .ofq-vcard__row--side i {
    /* 부가 안의 (가격) — 살짝 작게 회색 */
    font-style: normal; font-size: 10.5px; color: #aaa;
  }
  .ofq-vcard__colors {
    display: flex; gap: 18px; flex-wrap: wrap;
    font-size: 12px;
  }
  /* 색상 인라인 스왓치 */
  .color-inline {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .color-inline .swatch-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1); display: inline-block;
  }
  /* 옵션 뱃지 - 차량 카드 안에서 자연스럽게 wrap */
  .ofq-vcard .qp-opt-chips {
    display: flex; flex-wrap: wrap; gap: 5px;
    min-width: 0;
  }
  .ofq-vcard .qp-opt-chips .badge {
    font-size: 10.5px; padding: 3px 8px;
    border-radius: var(--radius-sm);
  }
  .ofq-table .sep { color: #ccc; margin: 0 8px; }

  /* 월 대여료 산출 — 견적1/2/3 가로 비교 (엑셀 핵심) */
  .ofq-terms-table th.row-label, .ofq-terms-table td.row-label {
    background: var(--bg-soft); text-align: left;
    color: var(--ink-3); font-weight: 500;
    width: 92px;
    font-size: 11.5px;
  }
  .ofq-terms-table thead th {
    background: var(--bg-soft); color: var(--ink-1);
    font-weight: 600; padding: 6px 9px;
    font-size: 11.5px;
    border-right: 1px solid var(--line-2);
    border-bottom: 1.5px solid var(--brand);  /* 헤더 ↔ body 구분선 — brand 강조 */
  }
  .ofq-terms-table td {
    text-align: center;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);  /* row 구분선 */
  }
  .ofq-terms-table tr:last-child td { border-bottom: none; }
  .ofq-terms-table tr.monthly td {
    background: var(--bg-soft); font-weight: 700;
    color: var(--ink-1); font-size: 14px;
    padding: 8px 6px;
  }
  .ofq-terms-table tr.monthly th.row-label {
    background: var(--bg-soft); color: var(--ink-1); font-weight: 600;
  }
  .ofq-terms-table td.col-off { opacity: 0.35; background: var(--bg-muted); }
  .ofq-terms-table td.best {
    background: var(--brand-50);  /* 옅은 네이비 — 분홍 X */
    position: relative;
  }
  .ofq-terms-table td.best::after {
    content: 'BEST';
    position: absolute; top: 2px; right: 4px;
    font-size: 8px; font-weight: 700; color: var(--brand);
    letter-spacing: 0.5px;
  }

  /* 보험 가입 내역 — 8셀 그리드 (라벨-값 4쌍 × 2행) */
  .ofq-ins-table th { width: 88px; }
  .ofq-ins-table td.full { text-align: left; }

  /* 정비상품 — 표 (헤더 + 2행) */
  .ofq-svc-table th, .ofq-svc-table td {
    text-align: center; font-size: 11px;
    padding: 6px 4px;
  }
  .ofq-svc-table thead th {
    background: #fafafa; color: var(--brand); font-weight: 600;
  }
  .ofq-svc-table tbody th {
    background: #f6f6f6; font-weight: 600; color: #333;
  }

  /* 노트(주요 계약사항) — 번호 리스트 */
  .ofq-notes {
    margin: 0; padding-left: 20px;
    font-size: 11.5px; color: #555; line-height: 1.7;
  }
  .ofq-notes li { margin-bottom: 1px; }

  /* 제출서류 표 */
  .ofq-docs-table th {
    width: 80px; background: #f6f6f6; vertical-align: middle;
    text-align: center; font-weight: 600;
  }
  .ofq-docs-table td { font-size: 11px; line-height: 1.6; }
  .ofq-docs-table td small { color: #888; font-size: 10px; }

  /* 푸터 — 회사정보만 (밑줄 아래) */
  .ofq-footer {
    padding-top: 6px;
    border-top: 1.5px solid var(--brand);
  }
  /* 입금계좌 — 주요 계약사항 섹션 내부 */
  .ofq-footer__bank {
    background: var(--bg-soft); padding: 6px 10px;
    border: 1px solid var(--line-2);
    font-size: 11px; color: var(--ink-1); font-weight: 500;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .ofq-footer__bank b { color: var(--brand); }
  .ofq-footer__company {
    font-size: 9.5px; color: var(--ink-3); line-height: 1.5;
    padding: 0 4px;
    letter-spacing: 0;
    word-spacing: 1px;
  }
  .ofq-footer__company b { color: var(--ink-2); font-weight: 600; }

  /* 차종 구분 헤더 (다중 차종) — 정제 톤 */
  .ofq-vehicle-head {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 8px; padding: 6px 10px;
    background: var(--brand-50);
    border-left: 3px solid var(--brand);
    font-size: 12px;
  }
  .ofq-vehicle-head b {
    font-size: 13px; color: var(--brand); font-weight: 700;
  }
  .ofq-vehicle-head .sep { color: #ccc; }

  /* === 비교표 (가로 비교, N차종) === */
  .qd-compare {
    overflow-x: auto;
    background: var(--bg-soft); border-radius: var(--radius-md);
    padding: 10px 0;
  }
  .qd-compare table {
    width: 100%;
    border-collapse: separate; border-spacing: 0;
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
  }
  .qd-compare thead th {
    padding: 10px 6px 12px;
    font-size: 11px; font-weight: 600;
    color: #1a1a1a; letter-spacing: -0.3px;
    text-align: center;
    border-bottom: 2px solid #e0e0e0;
    line-height: 1.25;
  }
  .qd-compare thead th .brand-tiny {
    display: block; font-size: 9px; color: #999;
    font-weight: 500; letter-spacing: 0.5px;
    margin-bottom: 1px;
  }
  .qd-compare thead th.row-label {
    background: transparent;
    border-bottom-color: transparent;
  }
  .qd-compare tbody th {
    text-align: left; padding: 8px 8px 8px 10px;
    color: #999; font-weight: 500;
    font-size: 10.5px; letter-spacing: 0.5px;
    width: 62px;
    background: transparent;
    border-bottom: 1px solid #f0f0f0;
  }
  .qd-compare tbody td {
    padding: 8px 4px;
    text-align: center;
    color: #1a1a1a;
    border-bottom: 1px solid #f0f0f0;
    font-size: 11.5px;
  }
  .qd-compare tr.term td {
    font-weight: 500; color: #555;
  }
  .qd-compare tr.term td .best-mark {
    color: var(--brand); font-weight: 700;
  }
  .qd-compare tr.term td .best-tag {
    display: inline-block; font-size: 8.5px;
    background: var(--brand); color: #fff;
    padding: 1px 4px; border-radius: var(--radius-sm);
    margin-left: 3px; letter-spacing: 0.3px;
    vertical-align: 2px;
  }
  .qd-compare tr.price td { font-weight: 600; }
  .qd-compare tr:last-child td, .qd-compare tr:last-child th { border-bottom: 0; }
  .qd-compare td.cell-best {
    background: #fff7f7;
  }
  /* 컬럼 사이 가벼운 구분 */
  .qd-compare tbody td:not(:last-child),
  .qd-compare thead th:not(:last-child) {
    border-right: 1px solid #f0f0f0;
  }

  /* ================================================================
   * DESIGN SYSTEM — 공통 유틸 클래스 (.ds-*)
   * 견적서 official 톤 기준 — 모든 화면에서 동일하게 사용 가능
   * ================================================================ */

  /* 카드 — 흰 배경 + 옅은 보더 + 라운드 */
  .ds-card {
    background: var(--bg);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-md);
    padding: var(--space-5);
  }
  .ds-card--soft { background: var(--bg-soft); }
  .ds-card--accent {
    background: var(--brand-50);
    border-color: var(--brand-100);
  }

  /* 섹션 타이틀 — 견적서 official 의 letter-spaced 빨간 라벨 */
  .ds-section-title {
    font-size: 11px; font-weight: 700;
    color: var(--brand);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: var(--space-1);
    border-bottom: 1px solid var(--line-2);
    margin-bottom: var(--space-3);
  }
  .ds-section-title .unit {
    font-size: 10px; color: var(--ink-4); font-weight: 400;
    letter-spacing: 0; margin-left: var(--space-2);
    text-transform: none;
  }

  /* 버튼 — 통일 규격 (30px 높이) */
  .ds-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: var(--space-2);
    height: 30px; padding: 0 var(--space-3);
    border: 1px solid transparent;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: var(--font-size-base); font-weight: 500;
    letter-spacing: -0.2px; line-height: 1;
    cursor: pointer; white-space: nowrap;
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), opacity var(--t-fast);
    background: transparent; color: var(--ink-2);
  }
  .ds-btn i { font-size: 14px; flex-shrink: 0; }
  .ds-btn:hover { background: var(--accent-soft); color: var(--ink-1); }
  .ds-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .ds-btn--primary {
    background: var(--brand); color: #fff;
  }
  .ds-btn--primary:hover { background: var(--brand-700); color: #fff; }
  .ds-btn--soft {
    background: var(--brand-50); color: var(--brand); font-weight: 500;
  }
  .ds-btn--soft:hover { background: var(--brand-100); }
  .ds-btn--outline {
    background: var(--bg); color: var(--ink-2);
    border-color: var(--line-2);
  }
  .ds-btn--outline:hover {
    background: var(--bg-soft); color: var(--ink-1);
    border-color: var(--line-3);
  }
  .ds-btn--lg { height: 40px; padding: 0 var(--space-4); font-size: 13px; }
  .ds-btn--sm { height: 24px; padding: 0 var(--space-2); font-size: 11px; }

  /* 입력 — 밑줄형 (영업 ERP) 또는 박스형 (form) */
  .ds-input {
    height: 30px; padding: 0 var(--space-2);
    border: 0; border-bottom: 1px solid var(--line-2);
    background: transparent;
    font-family: inherit; font-size: var(--font-size-base);
    color: var(--ink-1);
    outline: none;
    transition: border-color var(--t-fast);
    width: 100%;
  }
  .ds-input::placeholder { color: var(--ink-4); }
  .ds-input:hover { border-bottom-color: var(--ink-3); }
  .ds-input:focus { border-bottom-color: var(--brand); }
  .ds-input--box {
    height: 36px;
    border: 1px solid var(--line-2); border-radius: var(--radius);
    background: var(--bg-soft);
    padding: 0 var(--space-3);
  }
  .ds-input--box:focus { background: var(--bg); border-color: var(--brand); }

  /* 격자 표 — 견적서 official */
  .ds-table {
    width: 100%; border-collapse: collapse;
    font-size: var(--font-size-base);
    font-variant-numeric: tabular-nums;
  }
  .ds-table th, .ds-table td {
    border: 1px solid var(--line-3);
    padding: 7px 10px;
    vertical-align: middle;
    line-height: 1.4;
  }
  .ds-table th {
    background: var(--bg-soft);
    color: var(--ink-3); font-weight: 500;
    text-align: center; white-space: nowrap;
    font-size: var(--font-size-sm);
  }
  .ds-table td {
    background: var(--bg); color: var(--ink-1);
    text-align: left;
  }
  .ds-table td.right { text-align: right; }
  .ds-table td.center { text-align: center; }
  .ds-table td.muted { color: var(--ink-4); }
  .ds-table td.price-brand { color: var(--brand); font-weight: 700; }

  /* 뱃지 / 칩 */
  .ds-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    font-size: 10.5px; font-weight: 500;
    background: var(--bg); color: var(--ink-2);
    border: 1px solid var(--line-2);
    white-space: nowrap; line-height: 1.4;
  }
  .ds-badge--brand {
    background: var(--brand-50); color: var(--brand);
    border-color: var(--brand-100);
  }
  .ds-badge--soft {
    background: var(--accent-soft); color: var(--ink-2);
    border-color: transparent;
  }

  /* 모달 공통 */
  .ds-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .ds-modal-backdrop.is-open { display: flex; }
  .ds-modal {
    background: var(--bg);
    border-radius: var(--radius-lg);
    max-width: 600px; width: 92%; max-height: 92vh;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-xl);
  }
  .ds-modal__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-3) var(--space-5);
    background: var(--bg-soft);
    border-bottom: 1px solid var(--line-2);
    font-size: var(--font-size-md); font-weight: 500;
    color: var(--ink-1);
  }
  .ds-modal__body {
    flex: 1; overflow-y: auto;
    padding: var(--space-5);
  }
  .ds-modal__foot {
    padding: var(--space-3) var(--space-5);
    border-top: 1px solid var(--line-2);
    background: var(--bg-soft);
    display: flex; justify-content: flex-end; gap: var(--space-2);
  }

  /* 폼 라벨 - 인라인 (라벨 + 입력 한 줄) */
  .ds-field {
    display: grid; grid-template-columns: auto 1fr;
    align-items: center; gap: var(--space-2);
  }
  .ds-field > label {
    font-size: var(--font-size-sm); color: var(--ink-4);

<script>
  // 우측 패널 contract/chat 로직은 Vue RightPanel.vue로 이전됨 — 아래 옛 코드는 실행 안 함
  if (false) {
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.contract-tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.contract-tab').forEach((b) => b.classList.toggle('active', b === btn));
        const tab = btn.dataset.tab;
        document.querySelectorAll('.contract-content').forEach((c) => {
          c.hidden = c.dataset.pane !== tab;
        });
      });
    });
    // 서류 업로드 (면허증 = 단일 / 첨부서류 = 다중)
    const fmtSize = (b) => b < 1024 ? `${b}B` : b < 1048576 ? `${(b/1024).toFixed(1)}KB` : `${(b/1048576).toFixed(1)}MB`;
    const docStore = { license: null, attachments: [] };
    const updateAccCount = () => {
      const total = (docStore.license ? 1 : 0) + docStore.attachments.length;
      const el = document.getElementById('contract-acc-count');
      if (el) { el.textContent = total ? `${total}건` : ''; el.classList.toggle('has', total > 0); }
    };
    const renderList = (listEl, files, onRemove) => {
      listEl.innerHTML = files.map((f, i) => `
        <div class="doc-file-item">
          <i class="ph ph-file-text"></i>
          <span class="name">${f.name}</span>
          <span class="size">${fmtSize(f.size)}</span>
          <span class="remove" data-i="${i}">✕</span>
        </div>`).join('');
      listEl.querySelectorAll('.remove').forEach(el => {
        el.addEventListener('click', (ev) => { ev.preventDefault(); onRemove(+el.dataset.i); });
      });
    };
    // 면허증
    const licDz = document.getElementById('doc-license-dropzone');
    const licInput = document.getElementById('doc-license-input');
    const licList = document.getElementById('doc-license-list');
    const refreshLic = () => {
      licDz.classList.toggle('has-file', !!docStore.license);
      renderList(licList, docStore.license ? [docStore.license] : [], () => {
        docStore.license = null; licInput.value = ''; licDz.classList.remove('has-file'); licList.innerHTML = '';
        updateAccCount();
      });
      updateAccCount();
    };
    licInput?.addEventListener('change', (e) => {
      docStore.license = e.target.files[0] || null;
      refreshLic();
    });
    // 면허증 드래그앤드롭 (단일 — 이미지/PDF만)
    ['dragenter','dragover'].forEach(ev => licDz?.addEventListener(ev, (e) => { e.preventDefault(); licDz.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(ev => licDz?.addEventListener(ev, (e) => { e.preventDefault(); licDz.classList.remove('dragover'); }));
    licDz?.addEventListener('drop', (e) => {
      const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type.startsWith('image/') || f.type === 'application/pdf');
      if (files.length) { docStore.license = files[0]; refreshLic(); }
    });
    // 첨부서류 (다중)
    const attDz = document.getElementById('doc-dropzone');
    const attInput = document.getElementById('doc-input');
    const attList = document.getElementById('doc-file-list');
    const refreshAtt = () => {
      attDz.classList.toggle('has-file', docStore.attachments.length > 0);
      renderList(attList, docStore.attachments, (i) => { docStore.attachments.splice(i, 1); refreshAtt(); });
      updateAccCount();
    };
    attInput?.addEventListener('change', (e) => {
      docStore.attachments.push(...Array.from(e.target.files || []));
      attInput.value = '';
      refreshAtt();
    });
    // 드래그앤드롭 (첨부서류만 다중 허용)
    ['dragenter','dragover'].forEach(ev => attDz?.addEventListener(ev, (e) => { e.preventDefault(); attDz.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(ev => attDz?.addEventListener(ev, (e) => { e.preventDefault(); attDz.classList.remove('dragover'); }));
    attDz?.addEventListener('drop', (e) => {
      const files = Array.from(e.dataTransfer?.files || []);
      if (files.length) { docStore.attachments.push(...files); refreshAtt(); }
    });
    window.__welrix_docStore = docStore;
    // 채팅 placeholder 전송
    const send = () => {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;
      const box = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg me';
      div.innerHTML = `<div class="chat-msg__author">${document.getElementById('chat-user-name').textContent}</div>${msg}`;
      box.appendChild(div);
      input.value = '';
      box.scrollTop = box.scrollHeight;
    };
    document.getElementById('btn-chat-send')?.addEventListener('click', send);
    document.getElementById('chat-input')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    // 익명 닉네임
    const nicknames = ['익명 호랑이', '익명 사슴', '익명 늑대', '익명 여우', '익명 토끼', '익명 곰'];
    document.getElementById('chat-user-name').innerHTML = `<i class="ph ph-user"></i>${nicknames[Math.floor(Math.random() * nicknames.length)]}`;
    // 계약 접수 버튼
    document.getElementById('btn-contract-submit')?.addEventListener('click', () => {
      if (!docStore.license) { alert('운전면허증을 첨부해 주세요.'); return; }
      // 차후 Firebase 저장 + 알림
      alert(`계약 접수 요청 전송\n- 면허증: ${docStore.license.name}\n- 첨부서류 ${docStore.attachments.length}건\n(다음 단계: Firebase 연동)`);
    });
  });
  }  // end if(false) — Vue가 처리
</script>

<!-- URL 모드 분기:
     ?q=<id>   = 손님 견적서 (customer-view 가 body 재구성)

<script type="module" src="./src/customer-view.js"></script>

<script type="module">
  const p = new URLSearchParams(location.search);
  if (!p.get('q') && p.get('admin') !== '1') {
    // dynamic import — Vite 가 별도 chunk 로 번들 (createElement('script') 는 prod 에서 raw 경로 404)
    import('./quote.js');
    import('./src/main.js');
  }
</script>
