<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <title>영업자 견적기 · 웰릭스 모빌리티</title>
  <meta name="description" content="웰릭스 모빌리티 영업자 전용 견적기 입장" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" href="/welrix-ci.png" />

  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <style>
    :root {
      --brand: #e1141e;
      --brand-700: #b50f17;
      --brand-50: #fef0f1;
      --ink-1: #0a0a0a;
      --ink-2: #2a2a2e;
      --ink-3: #6b6f78;
      --ink-4: #9ca0aa;
      --line: #e8e9ec;
      --line-2: #d4d6db;
      --bg: #fff;
      --bg-soft: #f7f8fa;
      --t-fast: 0.18s ease;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink-1); min-height: 100vh; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, system-ui, sans-serif;
      font-size: 14px; line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* 배경 — 옅은 그라데이션 */
    body {
      background:
        radial-gradient(circle at 80% 10%, rgba(225, 20, 30, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 20% 90%, rgba(225, 20, 30, 0.04) 0%, transparent 50%),
        var(--bg-soft);
    }

    /* Top nav */
    .ag-nav {
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .ag-nav__brand {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 800;
      color: var(--ink-1);
      letter-spacing: -0.02em;
    }
    .ag-nav__brand-x { color: var(--brand); margin: 0 2px; }
    .ag-nav__home {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--ink-3); font-weight: 600;
      padding: 6px 12px; border-radius: 999px;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .ag-nav__home:hover { background: var(--bg); color: var(--ink-1); }

    /* Center card */
    .ag-main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 20px 60px;
    }
    .ag-card {
      width: 100%; max-width: 460px;
      background: var(--bg);
      border-radius: 24px;
      padding: 36px 32px 32px;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.08),
        0 6px 16px rgba(0,0,0,0.04);
      border: 1px solid var(--line);
    }
    @media (max-width: 480px) { .ag-card { padding: 28px 22px; border-radius: 18px; } }

    .ag-card__eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--ink-1); color: #fff;
      padding: 6px 12px; border-radius: 999px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
      margin-bottom: 16px;
    }
    .ag-card__eyebrow i { font-size: 12px; color: var(--brand); }

    .ag-card__title {
      margin: 0 0 8px;
      font-size: 26px; font-weight: 800; color: var(--ink-1);
      letter-spacing: -0.03em; line-height: 1.2;
    }
    .ag-card__title em { font-style: normal; color: var(--brand); }
    .ag-card__sub {
      margin: 0 0 24px;
      font-size: 13.5px; color: var(--ink-3); line-height: 1.65;
      letter-spacing: -0.01em;
    }

    /* 기능 리스트 */
    .ag-features {
      margin: 0 0 24px;
      padding: 18px 20px;
      background: var(--bg-soft);
      border-radius: 14px;
    }
    .ag-feature {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 0;
      font-size: 13px; color: var(--ink-2);
      letter-spacing: -0.01em;
    }
    .ag-feature i {
      font-size: 16px; color: var(--brand);
      flex-shrink: 0;
    }
    .ag-feature b { font-weight: 700; color: var(--ink-1); margin-right: 2px; }

    /* CTA */
    .ag-cta {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 56px;
      background: var(--ink-1); color: #fff;
      border: 0; border-radius: 999px;
      font-family: inherit;
      font-size: 15px; font-weight: 800;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition: background var(--t-fast), transform var(--t-fast);
    }
    .ag-cta:hover { background: var(--brand); transform: translateY(-1px); }
    .ag-cta i { font-size: 17px; }

    .ag-note {
      margin-top: 16px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11.5px; color: var(--ink-4);
      letter-spacing: -0.01em;
      justify-content: center;
    }
    .ag-note i { font-size: 13px; color: var(--ink-4); }

    /* Footer */
    .ag-foot {
      text-align: center;
      padding: 24px 20px;
      font-size: 11px; color: var(--ink-4);
      letter-spacing: -0.01em;
    }
    .ag-foot a { color: var(--ink-3); }
    .ag-foot a:hover { color: var(--brand); }
  </style>
</head>
<body>
  <nav class="ag-nav">
    <a class="ag-nav__brand" href="/agent.html">
      welri<span class="ag-nav__brand-x">x</span> · Pro
    </a>
    <a class="ag-nav__home" href="/home.html">
      <i class="ph ph-storefront"></i> 일반 사이트
    </a>
  </nav>

  <main class="ag-main">
    <div class="ag-card">
      <div class="ag-card__eyebrow">
        <i class="ph-fill ph-lock-key"></i> 영업자 전용
      </div>

      <h1 class="ag-card__title">
        영업자 <em>견적기</em>로<br>입장합니다
      </h1>
      <p class="ag-card__sub">
        현대·기아·제네시스 전 차종에 대한 상세 견적을 산출하고,
        손님 발송용 견적서까지 한 번에 처리하세요.
      </p>

      <div class="ag-features">
        <div class="ag-feature">
          <i class="ph-fill ph-check-circle"></i>
          <span><b>전 차종 트림 단위</b> 실시간 견적</span>
        </div>
        <div class="ag-feature">
          <i class="ph-fill ph-check-circle"></i>
          <span><b>옵션·할인·탁송</b> 까지 반영</span>
        </div>
        <div class="ag-feature">
          <i class="ph-fill ph-check-circle"></i>
          <span><b>견적바구니 · 발송용 견적서</b> 생성</span>
        </div>
        <div class="ag-feature">
          <i class="ph-fill ph-check-circle"></i>
          <span><b>표준 견적 · 관리자 도구</b> 포함</span>
        </div>
      </div>

      <a class="ag-cta" href="/index.html">
        <i class="ph-fill ph-rocket-launch"></i> 견적기 입장
      </a>

      <div class="ag-note">
        <i class="ph ph-info"></i>
        영업자 PIN 입력이 필요합니다
      </div>
    </div>
  </main>

  <footer class="ag-foot">
    웰릭스 모빌리티 · 신차 장기렌터카 ·
    <a href="/home.html">일반 안내 페이지</a>
  </footer>
</body>
</html>
